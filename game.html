                        case 'gilet':
                            ctx.fillStyle = "rgba(0,0,0,0.4)"; ctx.fillRect(20, 40, 20, 50); // Gilet scuro
                            ctx.fillStyle = "#fff"; ctx.fillRect(28, 50, 4, 4); ctx.fillRect(28, 65, 4, 4); ctx.fillRect(28, 80, 4, 4);
                            break;
                        case 'polo':
                            ctx.fillStyle = "rgba(255,255,255,0.6)";
                            ctx.beginPath(); ctx.moveTo(15,40); ctx.lineTo(45,40); ctx.lineTo(30,60); ctx.closePath(); ctx.fill();
                            ctx.fillRect(28, 58, 4, 12); // Bottoniera polo
                            break;
                        case 'logo':
                            ctx.fillStyle = "#fff"; ctx.fillRect(18, 52, 24, 24);
                            ctx.fillStyle = c.dress; ctx.fillRect(22, 56, 16, 16);
                            break;
                        case 'v-neck':
                            ctx.fillStyle = "rgba(0,0,0,0.3)";
                            ctx.beginPath(); ctx.moveTo(10,40); ctx.lineTo(50,40); ctx.lineTo(30,65); ctx.closePath(); ctx.fill();
                            break;
                    }
                    ctx.restore();
                }
                // -----------------------------------------
                let m = isDead ? 0 : Math.sin(anim) * 12; // Gambe ferme se morto
                ctx.fillStyle = c.bottom; 
                ctx.fillRect(10+m, 90, 18, 30); ctx.fillRect(32-m, 90, 18, 30);
                
                // Scarpe per Maschi
                ctx.fillStyle = c.shoes || "#000";
                ctx.fillRect(7+m, 115, 24, 10); ctx.fillRect(29-m, 115, 24, 10);
                ctx.restore(); ctx.restore(); return;
            } else { ctx.fillStyle = "#000"; ctx.fillRect(10, 0, 40, 10); } // Capelli Player
            
            // Busto / Giubbino (Riproprozionato)
            ctx.fillStyle = color;
            let mj = (extra.hasJacket !== undefined) ? extra.hasJacket : player.hasJacket;
            if (type === 'player' && mj) {
                ctx.fillStyle = player.jacketColor || "#ff4400";
                ctx.fillRect(8, 40, 48, 50); // Busto
                // Shading leggero
                ctx.fillStyle = "rgba(0,0,0,0.15)"; ctx.fillRect(8, 40, 10, 50); // Ombra
                ctx.fillStyle = "rgba(255,255,255,0.1)"; ctx.fillRect(42, 40, 10, 50); // Luce
                
                // Dettagli (No Orange)
                ctx.fillStyle = "rgba(0,0,0,0.3)";
                ctx.fillRect(8, 40, 48, 3); // Bordo colletto scuro
                ctx.fillRect(31, 43, 2, 47); // Seam verticale sottile
                ctx.fillRect(12, 75, 12, 2); // Tasca sinistra
                ctx.fillRect(40, 75, 12, 2); // Tasca destra
            } else if (type === 'player') {
                ctx.fillStyle = player.shirtColor;
                ctx.fillRect(10, 40, 44, 50); // Busto
                
                // Simbolo Random XL (Boring Style)
                ctx.fillStyle = "rgba(255,255,255,0.4)";
                if (player.shirtSymbol === 'heart') {
                    ctx.fillRect(22, 50, 20, 16); ctx.fillRect(26, 66, 12, 4); ctx.fillRect(30, 70, 4, 4);
                } else if (player.shirtSymbol === 'cross') {
                    ctx.fillRect(30, 48, 4, 24); ctx.fillRect(22, 58, 20, 4);
                } else if (player.shirtSymbol === 'flower') {
                    // Margherita
                    ctx.fillRect(28, 56, 8, 8); // Centro
                    ctx.fillRect(20, 56, 6, 8); ctx.fillRect(38, 56, 6, 8); // Petali orizzontali
                    ctx.fillRect(28, 48, 8, 6); ctx.fillRect(28, 66, 8, 6); // Petali verticali
                } else if (player.shirtSymbol === 'letterB') {
                    ctx.fillRect(24, 48, 4, 24); ctx.fillRect(24, 48, 16, 4);
                    ctx.fillRect(24, 58, 16, 4); ctx.fillRect(24, 68, 16, 4);
                    ctx.fillRect(36, 48, 4, 24);
                }

                // Ombreggiatura con Dithering Strategico (Transizioni)
                ctx.fillStyle = "rgba(0,0,0,0.15)"; 
                ctx.fillRect(10, 40, 10, 50); // Ombra solida
                // Dithering tra ombra e base
                for(let j=40; j<90; j+=4) {
                    ctx.fillRect(20 + (j%8==0?2:0), j, 2, 4);
                }
                ctx.fillStyle = "rgba(255,255,255,0.1)"; 
                ctx.fillRect(44, 40, 10, 50); // Luce solida
                // Dithering tra luce e base
                for(let j=40; j<90; j+=4) {
                    ctx.fillRect(42 - (j%8==0?2:0), j, 2, 4);
                }
                // Pieghe maglia
                ctx.strokeStyle = "rgba(0,0,0,0.2)"; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(25, 55); ctx.lineTo(35, 65); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(20, 75); ctx.lineTo(30, 85); ctx.stroke();
            } else ctx.fillRect(10, 40, 44, 50); // Busto snellito

            // Gambe / Pattini (Riproprozionati per il Marcatore)
            let m = Math.sin(anim) * 15;
            if (type === 'player') {
                // JEANS CON SHADING E USURA GINOCCHIA
                ctx.fillStyle = "#0000aa"; // Blu Base
                ctx.fillRect(14+m, 90, 18, 30); ctx.fillRect(32-m, 90, 18, 30); 
                ctx.fillStyle = "#000066"; // Blu Ombra (Posteriore)
                ctx.fillRect(14+m+12, 90, 6, 30); ctx.fillRect(32-m+12, 90, 6, 30); 
                ctx.fillStyle = "#4444ff"; // Usura Ginocchia
                ctx.fillRect(14+m+2, 105, 10, 4); ctx.fillRect(32-m+2, 105, 10, 4); 
            } else {
                ctx.fillStyle = type === 'robot' ? "#333" : "#0000aa";
                ctx.fillRect(5+m, 90, 22, 30); ctx.fillRect(33-m, 90, 22, 30);
            }
            if (type === 'player' && player.hasSkates) {
                ctx.fillStyle = "#ff8800"; // Stivali Arancioni
                ctx.fillRect(12+m, 110, 24, 15); ctx.fillRect(28-m, 110, 24, 15); 
                ctx.fillStyle = "#ffffff"; // Ruote Bianche
                ctx.fillRect(14+m, 125, 6, 6); ctx.fillRect(26+m, 125, 6, 6); 
                ctx.fillRect(30-m, 125, 6, 6); ctx.fillRect(42-m, 125, 6, 6);
            } else if (type === 'player' && player.hasShoes) {
                ctx.fillStyle = player.shoeBaseColor; // Colore Base
                ctx.fillRect(12+m, 115, 24, 10); ctx.fillRect(28-m, 115, 24, 10); 
                ctx.fillStyle = player.shoeDetailColor; // Colore Contrasto
                ctx.fillRect(14+m, 118, 8, 4); // Laccio Scarpa 1
                ctx.fillRect(30-m, 118, 8, 4); // Laccio Scarpa 2
            } else if (type === 'player') {
                ctx.fillStyle = "#333"; // Scarpe Base Grigio Scuro
                ctx.fillRect(12+m, 115, 20, 8); ctx.fillRect(28-m, 115, 20, 8);
            }

            // Animazione Braccio / Pugno che scatta (Spostata alla fine per non interferire)
            if (type === 'player' && player.punchTimer > 0) {
                ctx.save();
                ctx.setTransform(1, 0, 0, 1, 0, 0); 
                ctx.translate(cx + 30, y + 45); 
                ctx.rotate(player.punchAngle);
                ctx.fillStyle = player.hasJacket ? player.jacketColor : "#444";
                
                // Portata dinamica: base + bonus carica (max 130px circa)
                let maxReach = 60 + (player.punchPower * 0.7);
                let reach = maxReach * (1 - player.punchTimer / 20);
                
                ctx.fillRect(0, -10, reach, 20); // Braccio
                ctx.fillStyle = "#ffdbac";
                ctx.fillRect(reach, -12, 15, 24); // Pugno
                ctx.restore();
            }
            ctx.restore(); // Restore crouch scaling
            ctx.restore(); // Restore main humanoid translation
        }

        function drawJacketIcon(ctx, x, y, color = "#ff4400") {
            ctx.save();
            ctx.fillStyle = color;
            // Busto con Shading
            ctx.fillRect(x+20, y+15, 60, 75);
            ctx.fillStyle = "rgba(0,0,0,0.2)"; ctx.fillRect(x+20, y+15, 15, 75); // Ombra
            // Maniche
            ctx.fillStyle = color;
            ctx.fillRect(x, y+25, 25, 40); ctx.fillRect(x+75, y+25, 25, 40);
            // Colletto Arancione Acceso
            ctx.fillStyle = "#ff8800"; ctx.fillRect(x+25, y+10, 50, 10);
            // Zip Bianca con Dettagli
            ctx.fillStyle = "#fff"; ctx.fillRect(x+48, y+20, 4, 70);
            ctx.restore();
        }

        function draw() {
            ctx.clearRect(0, 0, SCREEN_W, SCREEN_H);
            ctx.globalAlpha = 1.0; // Reset universale ogni frame
            
            if (gameState === 'MENU' || gameState === 'GAMEOVER' || gameState === 'WIN') {
                // 1. SKYLINE COPPER DITHERED
                for(let y=0; y<SCREEN_H; y+=4) {
                    let r = Math.max(0, 10 - y/100);
                    let g = Math.max(0, 20 - y/50);
                    let b = Math.max(0, 40 - y/20);
                    ctx.fillStyle = `rgb(${r},${g},${b})`;
                    ctx.fillRect(0, y, SCREEN_W, 4);
                    // Effetto Dithering Amiga
                    if (y % 8 === 0) {
                        ctx.fillStyle = "rgba(255,255,255,0.02)";
                        for(let x=0; x<SCREEN_W; x+=8) ctx.fillRect(x + (y%16==0?4:0), y, 4, 4);
                    }
                }

                // 2. STRUTTURE MECCANICHE (Bitmap Brothers Style)
                ctx.fillStyle = "#0a0b10";
                // Silhouettes di fabbriche e tubi in lontananza
                for(let i=0; i<5; i++) {
                    let ox = i*500 - (gameTime*0.5)%500;
                    ctx.fillRect(ox, 400, 300, 680);
                    ctx.fillRect(ox-100, 600, 500, 480);
                    // Tubi e Cavi
                    ctx.strokeStyle = "#1a1b26"; ctx.lineWidth = 10;
                    ctx.beginPath(); ctx.moveTo(ox+150, 400); ctx.lineTo(ox+150, 0); ctx.stroke();
                    // Ingranaggi rotanti giganti nello sfondo
                    ctx.save();
                    ctx.translate(ox+150, 800); ctx.rotate(gameTime*0.005);
                    ctx.fillStyle = "#11121a";
                    for(let k=0; k<8; k++) {
                        ctx.rotate(Math.PI/4); ctx.fillRect(-20, -150, 40, 300);
                    }
                    ctx.restore();
                }


                // --- PORTRAIT ZOOM GIGANTE ATMOSFERICO (SOLO IN MENU) ---
                if (gameState === 'MENU') {
                    ctx.save();
                    ctx.globalAlpha = 0.7;

                    // 1. MARCATORE (SINISTRA)
                    ctx.save();
                    ctx.translate(-400, SCREEN_H - 40); 
                    ctx.scale(12, 12);
                    drawHumanoid(camera.x + 30, -42, "#222", 'player', 0);
                    ctx.restore();

                    // 2. ROBOT/DONNA (DESTRA)
                    ctx.save();
                    let redEyeWindow = (gameTime % 400 > 300);
                    let glitchWindow = (gameTime % 600 > 550);
                    let isGlitch = glitchWindow && Math.random() < 0.5;
                    let gx = isGlitch ? (Math.random()-0.5)*20 : 0;
                    let gy = isGlitch ? (Math.random()-0.5)*20 : 0;
                    
                    ctx.translate(SCREEN_W + 400 + gx, SCREEN_H - 40 + gy); 
                    ctx.scale(-12, 12); 
                    
                    if (isGlitch) {
                        drawHumanoid(camera.x + 30, -42, "#ff00ff", 'woman', 0, {colors: {hair: "#6d4c41", skin: "#ffdbac", dress: "#009688"}});
                    } else {
                        let eyeMode = glitchWindow ? 'none' : 'show';
                        drawHumanoid(camera.x + 30, -42, "#222", 'robot', 0, {eyesRed: redEyeWindow, eyes: eyeMode});
                    }
                    ctx.restore();
                    ctx.restore(); // Ripristina l'alfa 0.7
                }
                return;
            } else if (gameState === 'STORY') {
                // Sfondo Stelle per la storia
                ctx.fillStyle = "#000511"; ctx.fillRect(0,0,SCREEN_W, SCREEN_H);
                for(let i=0; i<60; i++) {
                    ctx.fillStyle = "rgba(255,255,255,"+(0.3 + Math.random()*0.7)+")";
                    ctx.fillRect((i*317)%SCREEN_W, (i*123)%SCREEN_H, 2, 2);
                }

                // ANIMAZIONE SCHEDE (introStep gestisce quale scena mostrare)
                ctx.save();
                let elapsed = gameTime - introStartTime;
                let titleElem = document.getElementById('intro-title');
                
                switch(introStep) {
                    case 1: // ONCE UPON A TIME
                        if (elapsed < 120) {
                             if (titleElem) titleElem.innerText = "Once upon a time";
                        } else {
                             // Arriva a 1964 in circa 4 secondi (240 frames)
                             let y = Math.min(1964, 1950 + Math.floor((elapsed - 120) / 18));
                             if (titleElem) titleElem.innerText = " " + y;
                        }
                        let fallPeriod = (SCREEN_H + 300) / 15;
                        let loops = Math.floor(elapsed / fallPeriod);
                        let fallY = (elapsed * 15) % (SCREEN_H + 300) - 150;
                        let shakeX = Math.sin(gameTime * 0.5) * 5;
                        
                        // AUTOMAZIONE: Dopo 4 loop passa alla prossima scheda (per dare tempo a Once upon a time)
                        if (loops >= 4) {
                            nextIntro();
                        }

                        ctx.translate(SCREEN_W * 0.75 + shakeX, fallY);
                        
                        // SCIA DI FIAMME E ENERGIA
                        for(let i=0; i<10; i++) {
                            ctx.fillStyle = `rgba(255, ${100 + Math.random()*155}, 0, ${0.5 - i/20})`;
                            ctx.beginPath();
                            ctx.arc((Math.random()-0.5)*30, -50 - i*15, 20 - i*2, 0, Math.PI*2);
                            ctx.fill();
                        }
                        // PARTICELLE ELETTRICHE (Azzurre)
                        if (gameTime % 2 === 0) {
                            ctx.strokeStyle = "#00ffff"; ctx.lineWidth = 2;
                            ctx.beginPath();
                            ctx.moveTo(0, 0);
                            ctx.lineTo((Math.random()-0.5)*80, (Math.random()-0.5)*80);
                            ctx.stroke();
                        }

                        ctx.scale(3, 3);
                        ctx.fillStyle = "#ff8800"; ctx.beginPath(); ctx.ellipse(0, 0, 15, 25, Math.sin(gameTime*0.02)*0.2, 0, Math.PI*2); ctx.fill();
                        ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.stroke();
                        // Aura pulsante
                        ctx.strokeStyle = "rgba(0, 255, 255, 0.4)"; ctx.lineWidth = 1;
                        ctx.beginPath(); ctx.arc(0, 0, 30 + Math.sin(gameTime*0.05)*5, 0, Math.PI*2); ctx.stroke();
                        break;
                        
                    case 2: // 1978
                        let year78 = Math.min(1978, 1964 + Math.floor(elapsed / 20));
                        if (titleElem) titleElem.innerText = " " + year78;
                        let fallPeriod2 = (SCREEN_H + 300) / 15;
                        let loops2 = Math.floor(elapsed / fallPeriod2);
                        
                        if (loops2 < 3) {
                            // LOOPING (Stessa logica di Case 1)
                            let fallY = (elapsed * 15) % (SCREEN_H + 300) - 150;
                            let shakeX = Math.sin(gameTime * 0.5) * 5;
                            ctx.translate(SCREEN_W * 0.75 + shakeX, fallY);
                            
                            // SCIA DI FIAMME E ENERGIA (Stesso di Case 1)
                            for(let i=0; i<10; i++) {
                                ctx.fillStyle = `rgba(255, ${100 + Math.random()*155}, 0, ${0.5 - i/20})`;
                                ctx.beginPath(); ctx.arc((Math.random()-0.5)*30, -50 - i*15, 20 - i*2, 0, Math.PI*2); ctx.fill();
                            }
                            ctx.scale(3, 3);
                            ctx.fillStyle = "#ff8800"; ctx.beginPath(); ctx.ellipse(0, 0, 15, 25, Math.sin(gameTime*0.02)*0.2, 0, Math.PI*2); ctx.fill();
                            ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.stroke();
                        } else {
                            // SCHIANTO FINALE (Logica originale rallentata per buffer 2s)
                            let crashElapsed = elapsed - (fallPeriod2 * 3);
                            ctx.translate(SCREEN_W * 0.75, 850);
                            let podY = -1200 + crashElapsed * 20;
                            
                            if (podY < 0) {
                                ctx.save(); ctx.translate(0, podY); ctx.scale(3, 3);
                                ctx.fillStyle = "#ff8800"; ctx.beginPath(); ctx.ellipse(0, 0, 15, 25, 0, 0, Math.PI*2); ctx.fill();
                                ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.stroke();
                                ctx.restore();
                            } else {
                                ctx.scale(2.5, 2.5); drawJacketIcon(ctx, -50, -50, "#ff4400");
                                // AUTOMAZIONE: 3 secondi dopo lo schianto
                                if (crashElapsed > 180) { nextIntro(); }
                            }
                        }
                        break;

                    case 3: // 1990 (Trasformazione)
                        if (titleElem) titleElem.innerText = " " + Math.min(1990, 1978 + Math.floor(elapsed / 20));
                        ctx.translate(0, 850);
                        let jacketX = SCREEN_W * 0.75;
                        let stopX = jacketX - 200; // MOLTO PIU INDIETRO
                        let nerdX = Math.min(stopX, 200 + elapsed * 3);
                        let isMarcatore = nerdX >= stopX;
                        let transformTime = (stopX - 200) / 3; 
                        
                        // Disegno Giubbino
                        if (elapsed < transformTime + 10) {
                            ctx.save(); ctx.translate(jacketX, 0); ctx.scale(2.5, 2.5);
                            drawJacketIcon(ctx, -50, -50, "#ff4400");
                            ctx.restore();
                        }

                        // Disegno Player
                        ctx.save();
                        let glitch = (elapsed > transformTime && elapsed < transformTime + 20) ? (Math.random()-0.5)*25 : 0;
                        ctx.translate(nerdX + glitch, glitch); ctx.scale(4, 4);
                        drawHumanoid(camera.x + 30, -42, isMarcatore ? "#ff4400" : "#222", 'player', isMarcatore ? 0 : elapsed*0.06, {hasJacket: isMarcatore});
                        ctx.restore();

                        // EFFETTO FLASH EMP (Azzurro con scosse Gialle)
                        if (elapsed > transformTime && elapsed < transformTime + 50) {
                            let t = elapsed - transformTime;
                            ctx.save(); ctx.translate(jacketX, -50);
                            
                            // Nucleo Azzurro Pulsante
                            let grad = ctx.createRadialGradient(0, 0, 0, 0, 0, t * 30);
                            grad.addColorStop(0, `rgba(0, 255, 255, ${1 - t/50})`);
                            grad.addColorStop(1, "rgba(0, 0, 255, 0)");
                            ctx.fillStyle = grad;
                            ctx.beginPath(); ctx.arc(0, 0, t * 30, 0, Math.PI*2); ctx.fill();

                            // Scosse Gialle (Fulmini)
                            ctx.strokeStyle = "#ffff00"; ctx.lineWidth = 3;
                            for(let i=0; i<3; i++) {
                                ctx.beginPath(); ctx.moveTo(0, 0);
                                let lx = 0, ly = 0;
                                for(let j=0; j<5; j++) {
                                    lx += (Math.random()-0.5) * 150;
                                    ly += (Math.random()-0.5) * 150;
                                    ctx.lineTo(lx, ly);
                                }
                                ctx.stroke();
                            }
                            ctx.restore();
                        }

                        // DONNE IN ESTASI (Rallentate e Coordinate)
                        if (isMarcatore && elapsed > transformTime + 60) {
                            const drawEstasi = (ox, delay, speed, color, isStripper=false) => {
                                let waitTime = isStripper ? 500 : 0; 
                                let dt = elapsed - (transformTime + 60);
                                if (dt < delay) return;
                                
                                let currentDt = dt - delay;
                                let wx = -200 + currentDt * speed;
                                
                                if (isStripper) {
                                    let walkToStop = (stopX - 1200 + 200) / speed;
                                    if (currentDt < walkToStop) wx = -200 + currentDt * speed;
                                    else if (currentDt < walkToStop + waitTime) wx = stopX - 1200;
                                    else wx = (stopX - 1200) + (currentDt - walkToStop - waitTime) * 20;
                                }
                                if (wx > stopX + ox) wx = stopX + ox;

                                // FUMETTI E CUORI
                                if (wx > 0) {
                                    drawBubble(wx + 50, -160, "Uuuuh il Marcatore™");
                                    if (gameTime % 30 < 15) {
                                        ctx.font = "40px Arial"; ctx.textAlign = "center"; ctx.fillStyle = "#ff0000";
                                        ctx.fillText("❤", wx + Math.sin(gameTime*0.1)*20, -220 - (gameTime%60));
                                        ctx.textAlign = "left";
                                    }
                                }

                                let inv = ['dress', 'shoes'];
                                let state = 'normal';
                                let myColors = {hair: "#6d4c41", skin: "#ffdbac", dress: color, shoes: "#333"};
                                
                                if (isStripper) {
                                    myColors = {hair: "#4e342e", skin: "#ffdbac", dress: "#ff00ff", shoes: "#ff0000"};
                                    inv = ['dress', 'bra', 'panties', 'shoes', 'cap'];
                                    let walkToStop = (stopX - 1200 + 200) / speed;
                                    let st = currentDt - walkToStop;
                                    if (st > 0) {
                                        if (st > 120 && inv.includes('cap')) {
                                            inv = ['dress', 'bra', 'panties', 'shoes'];
                                            clothes.push({ x: wx, y: -100, vx: 18, vy: -15, type: 'cap', onGround: false, color1: "#ff0000" });
                                        }
                                        if (st > 240 && inv.includes('dress')) {
                                            inv = ['bra', 'panties', 'shoes'];
                                            clothes.push({ x: wx, y: -50, vx: 20, vy: -12, type: 'dress', onGround: false, color1: "#ff00ff", color2: "#333" });
                                        }
                                        if (st > 360 && inv.includes('bra')) {
                                            inv = ['panties', 'shoes'];
                                            clothes.push({ x: wx, y: -40, vx: 22, vy: -10, type: 'bra', onGround: false, color1: "#ff00ff" });
                                        }
                                        if (st > 480 && inv.includes('panties')) {
                                            inv = ['shoes'];
                                            clothes.push({ x: wx, y: -30, vx: 24, vy: -8, type: 'panties', onGround: false, color1: "#ff00ff" });
                                        }
                                        if (st > 600 && inv.includes('shoes')) {
                                            inv = []; state = 'berserk';
                                            clothes.push({ x: wx, y: -20, vx: 26, vy: -6, type: 'shoes', onGround: false, color1: "#ff0000" });
                                        }
                                    }
                                }

                                ctx.save(); ctx.translate(wx, 0); ctx.scale(4, 4);
                                drawHumanoid(camera.x + 30, -42, "#000", 'woman', currentDt*0.1, {inv: inv, state: state, colors: myColors});
                                ctx.restore();
                            };
                            drawEstasi(-35, 0, 8, "#00ff44");   // Donna 1
                            drawEstasi(35, 30, 9, "#00cc33");  // Donna 2
                            drawEstasi(0, 210, 6, "#ffff00", true); // Stripper
                        }
                        // AUTOMAZIONE: Dopo che la sequenza è finita (circa 25 secondi)
                        if (elapsed > transformTime + 1500) { nextIntro(); }
                        break;

                    case 4: // 2000 -> 2026 (Counter + Famiglia)
                        let year = Math.min(2026, 1990 + Math.floor(elapsed / 10));
                        if (titleElem) titleElem.innerText = " " + year;
                        
                        ctx.translate(SCREEN_W/2, 850); ctx.scale(4, 4);
                        
                        // 1. MOGLIE (BG - Destra) - Piedi allineati
                        ctx.save(); ctx.translate(30, 4); ctx.scale(0.95, 0.95);
                        drawHumanoid(-32, -42, "#333", 'woman', 0, {colors: {hair: "#6d4c41", skin: "#ffdbac", dress: "#4a148c"}, inv: ['dress', 'shoes']});
                        ctx.restore();

                        // 2. BARDO (Middle - CENTRO)
                        drawHumanoid(-32, -42, "#444", 'player', 0, {hasJacket: false});

                        // 3. FIGLIA (FG - Sinistra) - Piedi allineati (compensazione scala 0.5)
                        ctx.save(); ctx.translate(-25, 36); ctx.scale(0.5, 0.5);
                        drawHumanoid(-32, -42, "#555", 'woman', 0, {colors: {hair: "#6d4c41", skin: "#ffdbac", dress: "#c2185b"}, inv: ['dress', 'shoes']});
                        ctx.restore();
                        // AUTOMAZIONE: Dopo 7 secondi di attesa
                        if (elapsed > 420) { nextIntro(); }
                        break;

                    case 5: // REBOOT (Rapimento Doppio - TUTTI VESTITI)
                        let walkX = (elapsed * 3) % 1200 - 600;
                        ctx.translate(SCREEN_W/2 + walkX, 850); ctx.scale(4, 4);
                        // Robot
                        drawHumanoid(camera.x + 30, -42, "#333", 'robot', 0);
                        // Moglie (Spalla 1 - VESTITA)
                        ctx.save(); ctx.translate(10, -35); ctx.rotate(Math.PI/2);
                        drawHumanoid(camera.x + 30, -42, "#ff00ff", 'woman', 0, {colors: {hair: "#6d4c41", skin: "#ffdbac", dress: "#4a148c"}, inv: ['dress', 'shoes']});
                        ctx.restore();
                        // Figlia (Sotto braccio - PICCOLA VESTITA)
                        ctx.save(); ctx.translate(-15, -15); ctx.scale(0.5, 0.5); ctx.rotate(-Math.PI/4);
                        drawHumanoid(camera.x + 30, -42, "#ff00ff", 'woman', 0, {colors: {hair: "#6d4c41", skin: "#ffdbac", dress: "#c2185b"}, inv: ['dress', 'shoes']});
                        ctx.restore();
                        // AUTOMAZIONE: Dopo 2 loop completi della camminata (800 frame / 13 secondi)
                        if (titleElem) titleElem.innerText = " 2026";
                        if (elapsed > 800) { nextIntro(); }
                        break;
                }
                
                // AUTOMAZIONE INTER-LIVELLO (currentLevel > 1)
                if (currentLevel > 1) {
                    if (introStep === 1 && elapsed > 180) nextIntro(); // Level Complete -> Inter-Story (3s)
                    if (introStep === 2 && elapsed > 360) nextIntro(); // Inter-Story -> Start Game (6s)
                }
                
                ctx.restore();
                return;
            }
            
            // BACKGROUND DINAMICO PER LIVELLO
            if (currentLevel === 1) {
                ctx.fillStyle = "#000510"; // Notte Profonda
                ctx.fillRect(0, 0, SCREEN_W, SCREEN_H);
            } else if (currentLevel === 2) {
                ctx.fillStyle = "#2b1b17"; // Legno Scuro (Mansion)
                ctx.fillRect(0, 0, SCREEN_W, SCREEN_H);
                // Boiserie / Pannelli a muro
                ctx.strokeStyle = "#1b0f0c"; ctx.lineWidth = 15;
                for(let x=-400; x<SCREEN_W+400; x+=500) {
                    let bx = x - (camera.x * 0.1) % 500;
                    ctx.strokeRect(bx, 150, 400, 700);
                    ctx.strokeRect(bx+50, 200, 300, 600);
                }
            } else if (currentLevel === 3) {
                ctx.fillStyle = "#87CEEB"; // Giorno (Azzurro)
                ctx.fillRect(0, 0, SCREEN_W, SCREEN_H);
            } else if (currentLevel === 4) {
                ctx.fillStyle = "#222"; // Fabbrica (Grigio Scuro)
                ctx.fillRect(0, 0, SCREEN_W, SCREEN_H);
            }
            
            if (gameState === 'PLAY' || gameState === 'DEAD') {
                if (currentLevel === 1) {
                    // 1. CIELO STELLATO E LUNA (Profondissimo 0.05x)
                    ctx.fillStyle = "rgba(255,255,255,0.7)";
                    for(let i=0; i<100; i++) {
                        let sx = (i * 317 - camera.x * 0.05) % SCREEN_W;
                        if (sx < 0) sx += SCREEN_W;
                        let sy = (i * 123) % 600;
                        ctx.fillRect(sx, sy, 3, 3);
                    }
                    ctx.globalAlpha = 1;
                    ctx.fillStyle = "#ffffaa";
                    let moonX = (SCREEN_W * 0.8 - camera.x * 0.02) % SCREEN_W;
                    if (moonX < 0) moonX += SCREEN_W;
                    ctx.beginPath(); ctx.arc(moonX, 150, 80, 0, Math.PI*2); ctx.fill(); // Luna
                    ctx.fillStyle = "#000511"; ctx.beginPath(); ctx.arc(moonX+30, 150, 70, 0, Math.PI*2); ctx.fill(); // Ombra Luna
                    
                    // 1.5 CASTELLO ESTENSE (Landmark Unico - Parallasse 0.05x)
                    let castX = 1800 - camera.x * 0.05; 
                    ctx.save();
                    ctx.translate(castX, 600); 
                    ctx.fillStyle = "#000a1a"; // Colore sagoma profonda
                    ctx.fillRect(0, 0, 500, 300);
                    const tower = (tx, ty) => {
                        ctx.fillRect(tx, ty-100, 80, 100); ctx.fillRect(tx-10, ty-120, 100, 30);
                        ctx.fillStyle = "#ffaa00"; ctx.fillRect(tx+35, ty-60, 10, 15); ctx.fillStyle = "#000a1a";
                    };
                    tower(0, 0); tower(420, 0); tower(60, -40); tower(360, -40);
                    ctx.restore();

                    // 2. EDIFICI LONTANI (0.3x)
                    for(let i=0; i<12; i++) {
                        let bx = i*1000 - camera.x*0.3;
                        let bW = 400 + (i % 3) * 150; 
                        let bH = 1000 + Math.sin(i*2.3)*120; 
                        
                        if (currentLevel === 1 || (currentLevel === 4 && Math.random() > 0.5)) {
                        // DISEGNO ARCHITETTURA (Città/Fabbrica)
                        ctx.fillStyle = (currentLevel === 4) ? "#111" : "#050515";
                        ctx.fillRect(bx, 1080-bH, bW, bH);
                        ctx.strokeStyle = "#1a1a3a"; ctx.lineWidth = 4;
                        ctx.strokeRect(bx, 1080-bH, bW, bH);
                        
                        // GRIGLIA FINESTRE
                        let row = 0;
                        for(let fy=1080-bH+60; fy<1080; fy+=80) {
                            let col = 0;
                            for(let fx=bx+40; fx<bx+bW-40; fx+=70) {
                                let lit = cityLights[(i * 137 + row * 31 + col) % cityLights.length];
                                if (lit) {
                                    ctx.fillStyle = (currentLevel === 4) ? "rgba(255,50,0,0.3)" : "rgba(0,68,136,0.6)"; 
                                    ctx.fillRect(fx, fy, 25, 35);
                                }
                                col++;
                            }
                            row++;
                        }
                    } else if (currentLevel === 2) {
                        // DISEGNO INTERNI LONTANI (Parallasse di archi/porte)
                        ctx.fillStyle = "#1b0f0c";
                        ctx.fillRect(bx, 200, bW, 880);
                        ctx.fillStyle = "#3e2723";
                        ctx.beginPath();
                        ctx.ellipse(bx + bW/2, 500, bW/3, 300, 0, 0, Math.PI*2);
                        ctx.fill();
                    } else if (currentLevel === 3) {
                        // DISEGNO CITTA' GIORNO (Palazzi chiari)
                        ctx.fillStyle = "#ccc";
                        ctx.fillRect(bx, 1080-bH, bW, bH);
                        ctx.strokeStyle = "#999"; ctx.strokeRect(bx, 1080-bH, bW, bH);
                    }
                    }
                    // FILI TRA PALAZZI (0.3x)
                    ctx.strokeStyle = "#001020"; ctx.lineWidth = 1;
                    for(let i=0; i<10; i++) {
                        let x1 = i*1000 - camera.x*0.3 + 200;
                        let x2 = (i+1)*1000 - camera.x*0.3 + 200;
                        ctx.beginPath(); ctx.moveTo(x1, 300); ctx.quadraticCurveTo((x1+x2)/2, 350, x2, 310); ctx.stroke();
                    }
                    // 3. EDIFICI MEDI (0.6x)
                    for(let i=0; i<20; i++) {
                        let bx = i*600 - camera.x*0.6;
                        let bW = 250 + (i % 2) * 120;
                        let bH = 850 + Math.cos(i*1.7)*100;
                        ctx.fillStyle = "#002b4d"; ctx.fillRect(bx, 1080-bH, bW, bH);
                        ctx.fillStyle = "#001a33"; ctx.fillRect(bx-10, 1080-bH, bW+20, 20); // Cornicione
                        
                        // GRIGLIA FINESTRE PIENA (Animate Lente)
                        let row = 0;
                        for(let fy=1080-bH+40; fy<960; fy+=60) {
                            let col = 0;
                            for(let fx=bx+30; fx<bx+bW-30; fx+=50) {
                                // Accesso ultra-veloce all'array di stati
                                let lit = cityLights[(i * 251 + row * 43 + col) % cityLights.length];
                                ctx.fillStyle = lit ? "#ffffaa" : "#001a33";
                                ctx.fillRect(fx, fy, 20, 30);
                                col++;
                            }
                            row++;
                        }
                    }
                    // 4. MURETTO E RECINZIONE (Vicinissimo 0.8x)
                    for(let i=0; i<40; i++) {
                        let bx = i*300 - camera.x*0.8;
                        ctx.fillStyle = "#0a0a0a"; ctx.fillRect(bx, 900, 300, 60); 
                        ctx.strokeStyle = "#222"; ctx.lineWidth = 2;
                        for(let k=0; k<6; k++) { ctx.beginPath(); ctx.moveTo(bx+k*50, 900); ctx.lineTo(bx+k*50, 820); ctx.stroke(); }
                        ctx.beginPath(); ctx.moveTo(bx, 840); ctx.lineTo(bx+300, 840); ctx.stroke();
                        ctx.beginPath(); ctx.moveTo(bx, 870); ctx.lineTo(bx+300, 870); ctx.stroke();
                        
                        // ELEMENTI DECORATIVI (Statue / Gargoyle)
                        if (i % 5 === 0) {
                            ctx.fillStyle = "#1a1a1a";
                            ctx.fillRect(bx+120, 800, 60, 100); // Piedistallo
                            ctx.fillStyle = "#222";
                            ctx.beginPath(); ctx.arc(bx+150, 780, 25, 0, Math.PI*2); ctx.fill(); // Testa Statua
                            ctx.fillRect(bx+135, 805, 30, 40); // Busto
                        }
                    }
                } else if (currentLevel === 3) {
                    // 1. GIORNO (Città di Giorno)
                    ctx.fillStyle = "#87CEEB"; ctx.fillRect(0, 0, SCREEN_W, SCREEN_H); // Cielo Azzurro
                    ctx.fillStyle = "#fff"; // Nuvole
                    for(let i=0; i<10; i++) {
                        let nx = (i*600 - camera.x*0.1) % (SCREEN_W+400); if (nx<0) nx+=SCREEN_W;
                        ctx.beginPath(); ctx.arc(nx, 200, 50, 0, Math.PI*2); ctx.arc(nx+40, 210, 40, 0, Math.PI*2); ctx.fill();
                    }
                    ctx.fillStyle = "#ffdd00"; // Sole
                    ctx.beginPath(); ctx.arc(SCREEN_W-200, 150, 60, 0, Math.PI*2); ctx.fill();
                    // Edifici Giorno (Chiari)
                    for(let i=0; i<12; i++) {
                        let bx = i*1000 - camera.x*0.3;
                        ctx.fillStyle = "#ccc"; ctx.fillRect(bx, 1080-1000, 400, 1000);
                        ctx.fillStyle = "#eee"; ctx.fillRect(bx+50, 100, 300, 980);
                    }
                } else if (currentLevel === 2) {
                    // 1. CASA (Interno)
                    ctx.fillStyle = "#1a0f0a"; ctx.fillRect(0, 0, SCREEN_W, SCREEN_H);
                    for(let i=0; i<15; i++) {
                        let wx = i*600 - camera.x*0.5;
                        ctx.fillStyle = "#2b1b12"; ctx.fillRect(wx, 0, 580, SCREEN_H);
                        ctx.fillStyle = "#4e342e"; ctx.fillRect(wx+150, 300, 150, 200);
                        ctx.strokeStyle = "#aa8800"; ctx.lineWidth=8; ctx.strokeRect(wx+150, 300, 150, 200);
                    }
                } else if (currentLevel === 4) {
                    // 1. FABBRICA (Industriale)
                    ctx.fillStyle = "#050505"; ctx.fillRect(0, 0, SCREEN_W, SCREEN_H);
                    for(let i=0; i<10; i++) {
                        let fx = i*800 - camera.x*0.4;
                        ctx.fillStyle = "#151515"; ctx.fillRect(fx, 0, 700, SCREEN_H);
                        ctx.fillStyle = "#400"; ctx.fillRect(fx+100, 0, 40, SCREEN_H);
                        if (gameTime % 60 < 30) { ctx.fillStyle = "#f00"; ctx.fillRect(fx+100, (gameTime*8)%SCREEN_H, 40, 60); }
                        ctx.save(); ctx.translate(fx+400, 500); ctx.rotate(gameTime*0.01);
                        ctx.fillStyle = "#0a0a0a";
                        for(let k=0; k<6; k++) { ctx.rotate(Math.PI/3); ctx.fillRect(-20, -250, 40, 500); }
                        ctx.restore();
                    }
                }
            }

            if (gameState === 'OUTRO') {
                ctx.fillStyle = "#000511"; ctx.fillRect(0,0,SCREEN_W, SCREEN_H);
                // Stelle
                for(let i=0; i<60; i++) {
                    ctx.fillStyle = "rgba(255,255,255,0.5)"; ctx.fillRect((i*317)%SCREEN_W, (i*123)%SCREEN_H, 2, 2);
                }
                // CUORI FLUTTUANTI (Effetto Bolle/Pensieri)
                for(let i=0; i<30; i++) {
                    let hx = (i * 277) % SCREEN_W;
                    let hy = (i * 313 - gameTime * 0.5) % SCREEN_H;
                    if (hy < 0) hy += SCREEN_H;
                    let alpha = 0.2 + Math.sin(gameTime * 0.02 + i) * 0.6;
                    ctx.save();
                    ctx.globalAlpha = Math.max(0, alpha);
                    ctx.font = "25px Arial"; ctx.textAlign = "center"; ctx.fillStyle = "#ff0000";
                    ctx.fillText("❤", hx + Math.sin(gameTime * 0.01 + i) * 40, hy);
                    ctx.restore();
                }
                ctx.globalAlpha = 1.0;
                ctx.textAlign = "left"; // Reset immediato

                ctx.save();
                ctx.translate(SCREEN_W/2, 760); // Posizionamento al Nadir
                ctx.scale(4, 4);

                let elapsedOutro = gameTime - player.winTime;
                // Ciclo: 4s giù (crouch), 4s su (piedi)
                let vibeScale = ((elapsedOutro % 480) < 240) ? 0.85 : 1.0;

                // FOLLA MASCHILE (Dietro la famiglia)
                const maleTypes = ['alpha', 'passerby', 'nerd', 'disguise'];
                const patterns = ['plain','stripes','belt','gilet','polo','logo','v-neck'];
                
                // Ordinamento per profondità (Z-sorting) - Solo visibili (5-25)
                let crowdIndices = [];
                for(let i=5; i<=25; i++) if(i !== 15) crowdIndices.push(i);
                crowdIndices.sort((a, b) => {
                    let tzA = -20 - (a % 3) * 30;
                    let tzB = -20 - (b % 3) * 30;
                    return tzA - tzB; // Dal fondo (-80) al fronte (-20)
                });
            

                crowdIndices.forEach(i => {
                    let type = maleTypes[i % maleTypes.length];
                    // Logica dei Nerd (10: Alvaro, 14: Gesualdo, 18: Signor Lodi)
                    if (i === 10 || i === 14 || i === 18) {
                        type = 'nerd';
                    } else {
                        if (type === 'nerd') type = 'alpha'; 
                    }
                    
                    let tx = (i - 15) * 40;
                    let tz = -20 - (i % 3) * 30;
                    
                    let skinCol = "#ffdbac";
                    let hairCol = `hsl(${(i * 251) % 360}, 20%, 20%)`;
                    let dressCol = `hsl(${(i * 137) % 360}, 60%, 40%)`;
                    
                    if (i === 10) { hairCol = "#4e342e"; dressCol = "#eee"; } 
                    if (i === 14 || i === 18) { hairCol = skinCol; dressCol = "#333"; } 
                    
                    let colors = {
                        hair: hairCol,
                        skin: skinCol,
                        dress: dressCol,
                        bottom: "#222",
                        shoes: "#111",
                        pattern: patterns[i % patterns.length]
                    };

                    ctx.save();
                    ctx.translate(tx, tz);
                    
                    // APPLICA VIBE SOLO AI TRE CON GLI OCCHI GRANDI (Nerd: 10, 14, 18)
                    if (i === 10 || i === 14 || i === 18) {
                        ctx.translate(30, 120);
                        ctx.scale(1, vibeScale);
                        ctx.translate(-30, -120);
                    }

                    if (i === 23) type = 'nerd';
                    // AGGIUNTA MANUALE DEL BUN PER IL NERD 10 (DIETRO LA TESTA)
                    if (i === 10) {
                        ctx.save();
                        ctx.globalAlpha = 0.7;
                        ctx.fillStyle = hairCol;
                        ctx.fillRect(22, -52, 16, 12); // Spunta da dietro la testa, centrato
                        ctx.restore();
                    }
                    
                    drawHumanoid(0, -42, "#444", type, gameTime * 0.05, {colors: colors, ignoreCamera: true});
                    
                    // EFFETTI SPECIALI NERD
                    if (i === 10) {
                        // SUIT APERTA PER ALVARO
                        ctx.fillStyle = "#333";
                        ctx.fillRect(5, -2, 15, 40);  // Lato sinistro giacca
                        ctx.fillRect(40, -2, 15, 40); // Lato destro giacca
                    }

                    if (i === 18) {
                        ctx.fillStyle = "#000";
                        ctx.fillRect(24, -22, 12, 2); // Ponte
                        ctx.fillRect(10, -22, 2, 2);  // Asticella sinistra (a filo testa)
                        ctx.fillRect(48, -22, 2, 2);  // Asticella destra (a filo testa)
                    }

                    if (i === 18) {
                        // LAYER CAPELLI DIRADATI (10% ALPHA)
                        ctx.save();
                        ctx.globalAlpha = 0.1;
                        ctx.fillStyle = "#000";
                        ctx.fillRect(10, -42, 40, 15);
                        ctx.restore();
                    }
                    
                    ctx.restore();
                });

                // FAMIGLIA AL CENTRO (Dalla scheda 2026)
                const bgm_outro = document.getElementById('outro-bgm');
                let audioEnded = bgm_outro && bgm_outro.ended;
                
                if (audioEnded) {
                    if (!player.outroEndTime) player.outroEndTime = gameTime;
                    let elapsedAfterMusic = gameTime - player.outroEndTime;

                    if (elapsedAfterMusic > 1500) { // 25 secondi
                        let sequenceTime = elapsedAfterMusic - 1500;

                        // LA BAMBINA SCAPPA (Velocità 1.2)
                        player.childXOffset = (player.childXOffset || 50) + 1.2;

                        // EFFETTO FLASH EMP 1990 (Dura 50 frame dall'attivazione)
                        if (sequenceTime > 0 && sequenceTime < 50) {
                            ctx.save();
                            ctx.translate(player.childXOffset, 40);
                            let t = sequenceTime;
                            // Nucleo Azzurro
                            let grad = ctx.createRadialGradient(0, 0, 0, 0, 0, t * 20);
                            grad.addColorStop(0, `rgba(0, 255, 255, ${1 - t/50})`);
                            grad.addColorStop(1, "rgba(0, 0, 255, 0)");
                            ctx.fillStyle = grad;
                            ctx.beginPath(); ctx.arc(0, 0, t * 20, 0, Math.PI*2); ctx.fill();
                            // Fulmini Gialli
                            ctx.strokeStyle = "#ffff00"; ctx.lineWidth = 3;
                            for(let i=0; i<3; i++) {
                                ctx.beginPath(); ctx.moveTo(0, 0);
                                let lx = 0, ly = 0;
                                for(let j=0; j<4; j++) {
                                    lx += (Math.random()-0.5) * 100;
                                    ly += (Math.random()-0.5) * 100;
                                    ctx.lineTo(lx, ly);
                                }
                                ctx.stroke();
                            }
                            ctx.restore();
                            if (sequenceTime === 1) playSound('shoot');
                        }
                        
                        if (player.childXOffset > 300 && !player.uuuhTime) {
                            player.uuuhTime = gameTime;
                        }
                    }
                } else {
                    player.childXOffset = 50;
                }

                // Marcatore (x = -50)
                ctx.save(); ctx.translate(-50, 0); 
                drawHumanoid(0, -42, "#ff4400", 'player', 0, {ignoreCamera: true});
                ctx.restore();

                // Moglie (x = 10)
                ctx.save(); ctx.translate(10, 0); 
                drawHumanoid(0, -42, "#ff00ff", 'woman', 0, {colors: {hair: "#6d4c41", skin: "#ffdbac", dress: "#4a148c"}, inv: ['dress', 'shoes'], ignoreCamera: true});
                ctx.restore();

                // Figlia (x variabile - PICCOLA)
                ctx.save(); ctx.translate(player.childXOffset, 0); ctx.scale(0.7, 0.7); ctx.translate(0, 40);
                let childExtra = {colors: {hair: "#6d4c41", skin: "#ffdbac", dress: "#c2185b"}, inv: ['dress', 'shoes']};
                let hasJacketNow = audioEnded && (gameTime - player.outroEndTime > 1500);
                if (hasJacketNow) childExtra.hasJacket = true; 
                childExtra.ignoreCamera = true;
                drawHumanoid(0, -42, "#ff00ff", 'woman', hasJacketNow ? gameTime*0.2 : 0, childExtra);
                ctx.restore();

                ctx.restore();

                // DISEGNO FUMETTI (FUORI DAL CONTESTO TRASLATO - COORDINATE ASSOLUTE)
                if (player.uuuhTime) {
                    // Sequenza Folla (5 fumetti che appaiono e svaniscono)
                    for(let i=0; i<5; i++) {
                        let startT = player.uuuhTime + i*30;
                        if (gameTime > startT && gameTime < startT + 150) {
                            let ox = (i % 2 === 0 ? 50 : -50);
                            drawBubble(SCREEN_W - 450 + ox, 850 - i*100, "Uuuuh...", 'right');
                        }
                    }
                    
                    if (gameTime > player.uuuhTime + 180) {
                        drawBubble(SCREEN_W / 2 - 100, 680, "che due Collioni...", 'left');
                    }
                }

                // TITOLO FISSO CON EFFETTO NEON GLITCH E FADE
                if (elapsedOutro < 840) { // Dura 13s + 1s di fade
                    ctx.save();
                    let alpha = Math.min(1, (840 - elapsedOutro) / 60);
                    
                    // Effetto Acceso/Spento (Flicker tipo neon rotto)
                    let isOff = (elapsedOutro % 120 < 4) || (elapsedOutro % 200 < 6) || (Math.random() > 0.99);
                    ctx.globalAlpha = isOff ? alpha * 0.1 : alpha;
                    
                    // Effetto Glitch Neon (Jitter meno frenetico)
                    let gx = (Math.random() - 0.5) * (elapsedOutro % 40 < 3 ? 12 : 0);
                    let gy = (Math.random() - 0.5) * (elapsedOutro % 60 < 2 ? 8 : 0);
                    let flicker = (Math.random() > 0.95) ? 10 : 30;

                    ctx.fillStyle = "#fff"; ctx.font = "bold 150px VT323"; ctx.textAlign = "center";
                    ctx.shadowBlur = flicker; ctx.shadowColor = "#ff00ff";
                    ctx.fillText("PIXELATED LOVE", SCREEN_W/2 + gx, 180 + gy);
                    ctx.restore();
                }

                // CREDITS SCROLLING
                let scrollY = SCREEN_H - (gameTime - player.winTime) * 0.4;
                ctx.fillStyle = "#fff"; ctx.font = "bold 50px VT323"; ctx.textAlign = "center";
                ctx.shadowBlur = 15; ctx.shadowColor = "#ff00ff";
                credits.forEach((line, i) => {
                    let y = scrollY + i * 70;
                    if (y > -100 && y < SCREEN_H + 100) {
                        ctx.fillText(line, SCREEN_W/2, y);
                    }
                });
                ctx.shadowBlur = 0;
                
                if (scrollY + credits.length * 70 < -200) {
                    ctx.fillStyle = "#fff"; ctx.font = "30px VT323";
                    ctx.fillText(" ", SCREEN_W/2, SCREEN_H - 100);
                }
                return; // BLOCCO TOTALE ALTRI DISEGNI
            }

            // Livello
            level.platforms.forEach(p => {
                ctx.fillStyle = (currentLevel === 2) ? "#3e2723" : "#222"; 
                ctx.fillRect(p.x-camera.x, p.y, p.w, p.h);
                ctx.strokeStyle = (currentLevel === 2) ? "#ffaa00" : "#555"; 
                ctx.lineWidth = (currentLevel === 2) ? 3 : 5;
                ctx.strokeRect(p.x-camera.x, p.y, p.w, p.h);
                ctx.fillStyle = (currentLevel === 2) ? "rgba(255,170,0,0.3)" : "#00ffff"; 
                ctx.fillRect(p.x-camera.x, p.y, p.w, 12); // Neon o Bordo dorato
            });

            level.poles.forEach(p => {
                let px = p.x - camera.x;
                if (currentLevel === 2) {
                    // DISEGNO OGGETTI INTERNI (Invece dei pali)
                    let mod = Math.abs(p.x % 3);
                    if (mod === 0) { // LIBRERIA
                        ctx.fillStyle = "#4e342e"; ctx.fillRect(px, p.y+100, 120, p.h-100);
                        ctx.strokeStyle = "#2b1b17"; ctx.lineWidth=4; ctx.strokeRect(px, p.y+100, 120, p.h-100);
                        for(let ly=p.y+130; ly<p.y+p.h-30; ly+=50) {
                            for(let lx=px+10; lx<px+100; lx+=20) {
                                ctx.fillStyle = `hsl(${(ly+lx)%360}, 50%, 40%)`;
                                ctx.fillRect(lx, ly, 15, 40);
                            }
                        }
                    } else if (mod === 1) { // QUADRO GIGANTE
                        ctx.fillStyle = "#5d4037"; ctx.fillRect(px, p.y+200, 180, 240);
                        ctx.fillStyle = "#000"; ctx.fillRect(px+10, p.y+210, 160, 220);
                        ctx.fillStyle = "#333"; ctx.font = "20px Arial"; ctx.fillText("GURU #0004", px+30, p.y+320);
                    } else { // STATUA / VASO
                        ctx.fillStyle = "#eee"; // Marmo
                        ctx.fillRect(px+30, p.y+p.h-120, 60, 120); // Piedistallo
                        ctx.beginPath(); ctx.arc(px+60, p.y+p.h-160, 40, 0, Math.PI*2); ctx.fill(); // Busto
                    }
                } else {
                    ctx.fillStyle = "#444"; ctx.fillRect(px, p.y, 20, p.h); // Palo
                    ctx.fillStyle = p.lit ? "#ffff00" : "#222"; ctx.fillRect(px-10, p.y-10, 40, 20); // Testa
                }
            });

            // Disegno Fosse
            level.pits.forEach(pit => {
                ctx.fillStyle = "#000"; 
                ctx.fillRect(pit.x - pit.w/2 - camera.x, pit.y, pit.w, 40);
                // Effetto profondità dithered
                ctx.fillStyle = "rgba(0,255,255,0.1)";
                ctx.fillRect(pit.x - pit.w/2 - camera.x, pit.y, pit.w, 4); 
            });

            // Disegno Muretti
            level.walls.forEach(w => {
                ctx.fillStyle = "#333"; ctx.fillRect(w.x-camera.x, w.y, w.w, w.h);
                ctx.strokeStyle = "#111"; ctx.lineWidth = 4; ctx.strokeRect(w.x-camera.x, w.y, w.w, w.h);
                // Crepe
                ctx.strokeStyle = "#444"; ctx.beginPath(); ctx.moveTo(w.x+5-camera.x, w.y+10); ctx.lineTo(w.x+30-camera.x, w.y+50); ctx.stroke();
            });

            level.vines.forEach(v => {
                // Angolo già calcolato in update() — nessun ricalcolo
                let tx = v.x + Math.sin(v.angle)*(v.len*32);
                let ty = v.y + Math.cos(v.angle)*(v.len*32);
                ctx.strokeStyle = "#444"; ctx.lineWidth=6; ctx.beginPath(); ctx.moveTo(v.x-camera.x, v.y); ctx.lineTo(tx-camera.x, ty); ctx.stroke();
                ctx.strokeStyle = "#666"; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(v.x-camera.x, v.y); ctx.lineTo(tx-camera.x, ty); ctx.stroke(); 
            });

            // Entità (Culling Rendering per Performance)
            entities.forEach(en => {
                if (Math.abs(en.x - player.x) > SCREEN_W) {
                    if (en.type !== 'mansion') return; // Mansion sempre disegnata se vicina al viewport
                }
                if (en.type === 'jacket' && en.active) drawJacketIcon(ctx, en.x-camera.x, en.y, en.color);
                else if (en.type === 'tennis_shoes' && en.active) {
                    let sx = en.x - camera.x;
                    ctx.fillStyle = "rgba(0,0,0,0.3)"; ctx.fillRect(sx+10, en.y+32, 40, 4); // Ombra
                    ctx.fillStyle = en.color || "#ffffff"; 
                    ctx.fillRect(sx+10, en.y+15, 40, 15); // Corpo
                    ctx.fillRect(sx+10, en.y+5, 15, 10);  // Tallone/Caviglia
                    ctx.fillStyle = "#eee"; ctx.fillRect(sx+10, en.y+26, 40, 4); // Suola
                    ctx.fillStyle = en.detailColor || "#ff0000"; 
                    ctx.fillRect(sx+25, en.y+18, 15, 3);  // Logo/Lacci
                }
                else if (en.type === 'skates' && en.active) {
                    let sx = en.x - camera.x;
                    ctx.fillStyle = "rgba(0,0,0,0.3)"; ctx.fillRect(sx+10, en.y+32, 40, 4); // Ombra
                    ctx.fillStyle = "#ff8800"; // Colore Arancio
                    ctx.fillRect(sx+10, en.y+15, 40, 15); // Corpo
                    ctx.fillRect(sx+10, en.y+5, 15, 10);  // Tallone
                    ctx.fillStyle = "#eee"; ctx.fillRect(sx+10, en.y+26, 40, 4); // Suola
                    ctx.fillStyle = "#fff"; 
                    ctx.beginPath(); ctx.arc(sx+15, en.y+35, 6, 0, Math.PI*2); ctx.fill(); // Ruota 1
                    ctx.beginPath(); ctx.arc(sx+45, en.y+35, 6, 0, Math.PI*2); ctx.fill(); // Ruota 2
                }
                else if (en.type === 'sunglasses' && en.active) {
                    let sx = en.x - camera.x;
                    ctx.fillStyle = "rgba(0,0,0,0.3)"; ctx.fillRect(sx+10, en.y+32, 50, 4); // Ombra
                    ctx.fillStyle = "#000"; 
                    ctx.fillRect(sx+10, en.y+15, 22, 15); ctx.fillRect(sx+38, en.y+15, 22, 15); // Lenti Ray-Ban
                    ctx.fillRect(sx+32, en.y+18, 6, 3); // Ponte
                    ctx.strokeStyle = "rgba(255,255,255,0.4)"; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.moveTo(sx+15, en.y+18); ctx.lineTo(sx+25, en.y+28); ctx.stroke(); // Riflesso
                }
                else if (en.type === 'floppy' && en.active) {
                    let sx = en.x - camera.x;
                    ctx.fillStyle = "rgba(0,0,0,0.3)"; ctx.fillRect(sx+10, en.y+42, 40, 4); // Ombra
                    ctx.fillStyle = "#222"; ctx.fillRect(sx+10, en.y+10, 40, 40); // Corpo Disco
                    ctx.fillStyle = "#999"; ctx.fillRect(sx+15, en.y+10, 15, 12); // Shutter Metallico
                    ctx.fillStyle = "#fff"; ctx.fillRect(sx+15, en.y+25, 30, 20); // Etichetta
                    ctx.fillStyle = "#111"; ctx.fillRect(sx+42, en.y+12, 4, 4);   // Foro protezione
                }
                else if (en.type === 'chip' && en.active) {
                    let sx = en.x - camera.x;
                    ctx.fillStyle = "#004400"; ctx.fillRect(sx+10, en.y+20, 50, 20); // PCB
                    ctx.fillStyle = "#ffaa00"; ctx.fillRect(sx+15, en.y+18, 5, 5); ctx.fillRect(sx+40, en.y+18, 5, 5); // Pin
                }
                else if (en.type === 'mansion') { 
                    let mx = en.x - camera.x;
                    // Corpo principale
                    ctx.fillStyle = "#555"; ctx.fillRect(mx, en.y, en.w, en.h);
                    ctx.strokeStyle = "#333"; ctx.lineWidth = 4; ctx.strokeRect(mx, en.y, en.w, en.h);
                    
                    // Colonne Neoclassiche (5 colonne ben spaziate)
                    ctx.fillStyle = "#ddd";
                    for(let k=0; k<5; k++) {
                        ctx.fillRect(mx + 20 + k * ((en.w - 40) / 4), en.y + 10, 30, en.h - 10);
                    }
                    
                    // Timpano (Tetto a triangolo centrato)
                    ctx.fillStyle = "#444";
                    ctx.beginPath();
                    ctx.moveTo(mx - 40, en.y); 
                    ctx.lineTo(mx + en.w/2, en.y - 120); 
                    ctx.lineTo(mx + en.w + 40, en.y);
                    ctx.closePath(); ctx.fill(); ctx.stroke();
                    
                    // Porta e Finestre (Posizionate tra le colonne)
                    ctx.fillStyle = "#ffaa00"; // Luci interne
                    for(let r=0; r<2; r++) {
                        for(let c=0; c<4; c++) {
                            let fx = mx + 70 + c * ((en.w - 40) / 4);
                            ctx.fillRect(fx, en.y + 60 + r * 140, 50, 70);
                        }
                    }
                    ctx.fillStyle = "#3e2723"; 
                    ctx.fillRect(mx + en.w/2 - 50, en.y + en.h - 150, 100, 150); // Portone centrato
                    
                    // Insegna Neon
                    ctx.fillStyle = "#fff"; ctx.font = "bold 45px VT323"; ctx.textAlign = "center";
                    ctx.shadowBlur = 15; ctx.shadowColor = "#00ffff";
                    ctx.fillText("VILLA DEL PRODUTTORE DELL'HARDWARE", mx + en.w/2, en.y - 40);
                    ctx.shadowBlur = 0; ctx.textAlign = "left";
                }
                else if (en.type === 'teca') {
                    let tx = en.x - camera.x;
                    // Basamento tecnologico
                    ctx.fillStyle = "#222"; ctx.fillRect(tx + 100, en.y + en.h - 120, en.w - 200, 120);
                    ctx.strokeStyle = "#444"; ctx.lineWidth = 4; ctx.strokeRect(tx + 100, en.y + en.h - 120, en.w - 200, 120);
                    
                    // Vetro della teca
                    ctx.fillStyle = "rgba(0, 255, 255, 0.15)";
                    ctx.fillRect(tx + 150, en.y + 50, en.w - 300, en.h - 170);
                    ctx.strokeStyle = "rgba(0, 255, 255, 0.5)"; ctx.lineWidth = 6;
                    ctx.strokeRect(tx + 150, en.y + 50, en.w - 300, en.h - 170);
                    
                    // Il Giubbino Arancione (Sacro) al centro
                    ctx.save();
                    ctx.translate(tx + en.w/2 - 60, en.y + en.h/2 - 80);
                    ctx.scale(2, 2);
                    drawHumanoid(camera.x + 30, -42, "#ff4400", 'player', 0, {hasJacket: true});
                    ctx.restore();
                    
                    // Riflessi sul vetro
                    ctx.fillStyle = "rgba(255,255,255,0.1)";
                    ctx.beginPath(); ctx.moveTo(tx+150, en.y+50); ctx.lineTo(tx+300, en.y+50); ctx.lineTo(tx+150, en.y+200); ctx.fill();
                    
                    // Insegna Neon Teca
                    ctx.fillStyle = "#fff"; ctx.font = "bold 50px VT323"; ctx.textAlign = "center";
                    ctx.shadowBlur = 20; ctx.shadowColor = "#ff4400";
                    ctx.fillText("THE ORIGINAL JACKET", tx + en.w/2, en.y - 40);
                    ctx.shadowBlur = 0; ctx.textAlign = "left";
                }
                else if (en.type === 'woman') {
                    let color = en.attached ? "#ffdbac" : (en.stun > 0 ? "#aaa" : "#ff00ff");
                    drawHumanoid(en.x, en.y, color, 'woman', gameTime*0.1, {inv: en.inv, attached: en.attached, colors: en.colors, dir: en.dir, state: en.state});
                    if (en.bubbleTimer > 0) { drawBubble(en.x, en.y, en.bubble); }
                }
                else if (['alpha', 'passerby', 'nerd', 'disguise'].includes(en.type)) {
                    drawHumanoid(en.x, en.y, "#444", en.type, gameTime*0.1, {colors: en.colors, dir: en.dir, state: en.state});
                    if (en.bubbleTimer > 0) { drawBubble(en.x, en.y, en.bubble); }
                }
                else if (en.type === 'robot') drawHumanoid(en.x, en.y, en.frozen > 0 ? "#0ff" : "#555", 'robot', gameTime*0.05, {eyesRed: en.eyesRed, dir: en.dir, state: en.state});
                else if (en.type === 'chest') {
                    let cx = en.x - camera.x;
                    // Corpo (Arancione/Oro come da immagine)
                    ctx.fillStyle = "#D2691E"; ctx.fillRect(cx, en.y, 60, 60); 
                    ctx.fillStyle = "#FF8C00"; ctx.fillRect(cx+5, en.y+5, 50, 20); // Parte superiore chiara
                    ctx.strokeStyle = "#5D2906"; ctx.lineWidth = 4; ctx.strokeRect(cx, en.y, 60, 60);
                    
                    // Fasce orizzontali
                    ctx.fillStyle = "#8B4513"; ctx.fillRect(cx, en.y+25, 60, 8); 
                    
                    // Serratura Quadrata Centrale (come da immagine)
                    ctx.fillStyle = "#8B4513"; ctx.fillRect(cx+20, en.y+15, 20, 20); // Bordo serratura
                    ctx.fillStyle = "#FFD700"; ctx.fillRect(cx+24, en.y+19, 12, 12); // Centro oro
                    ctx.fillStyle = "#331a00"; ctx.fillRect(cx+28, en.y+23, 4, 4); // Buco serratura
                }
            });

            // Player, Bullets & Bubbles
            if (player.invTimer > 0 && gameTime % 4 < 2) { /* Flicker effect */ }
            else if (gameState === 'PLAY' || gameState === 'DEAD') {
                if (player.stun > 0) ctx.globalAlpha = 0.5;
                drawHumanoid(player.x, player.y, player.hasJacket ? "#ff4400" : "#444", 'player', player.anim);
                ctx.globalAlpha = 1;
            }



            if (player.bubbleTimer > 0) { drawBubble(player.x, player.y, player.bubble); }

            // Rendering Pali e Fasci di Luce
            level.poles.forEach(p => {
                let px = p.x - camera.x;
                ctx.fillStyle = "#444"; ctx.fillRect(px, p.y, 15, p.h); // Palo
                ctx.fillStyle = p.lit ? "#ffff00" : "#222"; ctx.fillRect(px-10, p.y-10, 35, 20); // Testa

                if (p.lit) {
                    ctx.save();
                    let grad = ctx.createLinearGradient(px, p.y, px, 960);
                    grad.addColorStop(0, "rgba(255,255,100,0.3)"); grad.addColorStop(1, "rgba(255,255,100,0)");
                    ctx.fillStyle = grad; 
                    ctx.beginPath(); ctx.moveTo(px+7, p.y);
                    ctx.lineTo(px-250, 960); ctx.lineTo(px+270, 960); ctx.fill();
                    ctx.restore();
                }
            });

            enemyBullets.forEach(eb => { 
                ctx.fillStyle = "#ff0000";
                if (eb.isLaser) {
                    ctx.fillRect(eb.x-camera.x, eb.y+15, 30, 10); // Laser più corto e normale
                    ctx.fillStyle = "#ffffff";
                    ctx.fillRect(eb.x-camera.x, eb.y+18, 30, 4);
                } else {
                    ctx.fillRect(eb.x-camera.x, eb.y, 24, 8); 
                }
            });
            
            // Rendering Impulsi EMP
            clothes.forEach(c => { 
                ctx.fillStyle = c.color1 || "#fff"; 
                ctx.strokeStyle = c.color2 || "#000";
                ctx.lineWidth = 2;
                let cx = c.x - camera.x;
                if (c.type === 'bra') { // Reggiseno HD
                    ctx.beginPath(); ctx.arc(cx, c.y, 10, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                    ctx.beginPath(); ctx.arc(cx+22, c.y, 10, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(cx+10, c.y); ctx.lineTo(cx+12, c.y); ctx.stroke();
                } else if (c.type === 'panties') { // Mutandine HD
                    ctx.beginPath(); ctx.moveTo(cx-10, c.y); ctx.lineTo(cx+30, c.y); 
                    ctx.lineTo(cx+10, c.y+22); ctx.closePath(); ctx.fill(); ctx.stroke();
                } else if (c.type === 'cap') { // Cappellino HD
                    ctx.fillStyle = "#ff0000"; ctx.fillRect(cx, c.y, 25, 6); // Visiera
                    ctx.fillRect(cx+2, c.y-8, 20, 10); // Base
                } else if (c.type === 'shoes') { // Scarpe HD
                    ctx.fillRect(cx, c.y, 15, 10); ctx.fillRect(cx+20, c.y, 15, 10);
                } else { // Vestito HD
                    ctx.fillRect(cx, c.y, 45, 50); ctx.strokeRect(cx, c.y, 45, 50);
                    ctx.fillStyle = c.color2; ctx.fillRect(cx, c.y+40, 45, 10);
                }
            });

            bullets.forEach(b => { 
                if (b.melee) {
                    // Cerchio rimosso visivamente come richiesto
                } else {
                    ctx.fillStyle = b.color;
                    ctx.beginPath(); ctx.arc(b.x-camera.x, b.y, 10 + b.power/10, 0, Math.PI*2); ctx.fill();
                    // Nucleo più chiaro
                    ctx.fillStyle = "#fff";
                    ctx.beginPath(); ctx.arc(b.x-camera.x, b.y, (10 + b.power/10) * 0.6, 0, Math.PI*2); ctx.fill();
                }
            });
            particles.forEach(p => { 
                ctx.fillStyle = p.color; 
                if (p.isHeart) {
                    ctx.font = "40px Arial"; ctx.textAlign = "center"; 
                    ctx.fillText("❤", p.x-camera.x, p.y);
                    ctx.textAlign = "left"; // Reset immediato
                } else {
                    ctx.fillRect(p.x-camera.x, p.y, 10, 10); 
                }
            });

            // Schermata di Morte
            if (gameState === 'DEAD' && player.deathTimer > 150) {
                ctx.fillStyle = "rgba(0,0,0,0.7)"; ctx.fillRect(0,0,SCREEN_W, SCREEN_H);
                ctx.fillStyle = "#ff0000"; ctx.font = "bold 350px VT323"; ctx.textAlign = "center";
                ctx.shadowBlur = 40; ctx.shadowColor = "#000";
                ctx.fillText("ACCASCIATO", SCREEN_W/2, SCREEN_H/2 - 100);
                ctx.shadowBlur = 0;
                ctx.fillStyle = "#fff"; ctx.font = "40px VT323";
                ctx.fillText("PREMI [SPAZIO] PER CHEATTARE", SCREEN_W/2, SCREEN_H/2 + 250);
                ctx.textAlign = "left"; // Reset
            }
            // Alert SHAKE! SHAKE!
            if (attachedCount > 0) {
                ctx.save();
                ctx.font = "bold 100px VT323";
                ctx.textAlign = "center";
                // Lampeggio rapido (Rosso / Giallo)
                ctx.fillStyle = (gameTime % 10 < 5) ? "#ff0000" : "#ffff00";
                ctx.shadowBlur = 30; ctx.shadowColor = "#000";
                ctx.fillText("SHAKE! SHAKE!", SCREEN_W/2, SCREEN_H/2 - 200);
                ctx.restore();
            }

            // TITOLO LIVELLO A SCOMPARSA
            if (gameState === 'PLAY' && player.levelTitleTimer > 0) {
                player.levelTitleTimer--;
                ctx.save();
                ctx.textAlign = "center";
                ctx.font = "bold 120px VT323";
                let alpha = Math.min(1, player.levelTitleTimer / 60);
                ctx.fillStyle = `rgba(255, 136, 0, ${alpha})`;
                ctx.shadowBlur = 20; ctx.shadowColor = "#000";
                
                const levelTitles = [
                    "", // Indice 0 non usato
                    "Chapter 1: Back to Fe future",
                    "LAB SWEET LAB",
                    "FUGA DALLA VILLA",
                    "LA FABBRICA"
                ];
                let t = levelTitles[currentLevel] || `Level ${currentLevel}`;
                ctx.fillText(t, SCREEN_W/2, SCREEN_H/2);
                ctx.restore();
            }
            // TUTORIAL OVERLAY
            if (player.tutorialTimer > 0) {
                ctx.save();
                ctx.fillStyle = "rgba(0, 0, 0, 0.85)";
                ctx.fillRect(40, 200, 380, 320);
                ctx.strokeStyle = "#00ffff"; ctx.lineWidth = 4;
                ctx.strokeRect(40, 200, 380, 320);
                
                ctx.fillStyle = "#00ffff"; ctx.font = "bold 36px VT323"; ctx.textAlign = "left";
                ctx.fillText("CONTROLS", 60, 240);
                
                ctx.fillStyle = "#fff"; ctx.font = "24px VT323"; ctx.textAlign = "left";
                const cmds = [
                    "WASD / ARROWS : Move & Jump",
                    "LMB (Hold)    : Charge Punch",
                    "SHIFT         : Dash (with Skates)",
                    "S             : Duck / Hide",
                    "W             : Climb Vines",
                    "SPACE         : Next Level"
                ];
                cmds.forEach((c, i) => {
                    ctx.fillText(c, 60, 280 + i*32);
                });
                
                ctx.globalAlpha = Math.sin(gameTime * 0.1) * 0.5 + 0.5;
                ctx.textAlign = "left";
                ctx.font = "bold 28px VT323";
                ctx.fillText("GET READY!", 60, 495);
                ctx.restore();
            }
            // --- DISEGNO BARRIERE (Another World Style) ---
            barriers.forEach(b => {
                ctx.save();
                let bx = b.x - camera.x;
                let alpha = Math.min(1, b.hp / 20); 
                ctx.globalAlpha = alpha;
                ctx.shadowBlur = 15 + Math.sin(gameTime * 0.2) * 5;
                ctx.shadowColor = "#ff4400";
                ctx.fillStyle = "rgba(255, 68, 0, 0.4)";
                ctx.fillRect(bx, b.y, b.w, b.h);
                ctx.fillStyle = "#fff";
                ctx.fillRect(bx + 8, b.y, 4, b.h);
                if (gameTime % 4 === 0) {
                    ctx.fillStyle = "#ff8800";
                    ctx.fillRect(bx + Math.random()*20, b.y + Math.random()*120, 2, 10);
                }
                ctx.restore();
            });
        } // FINE DRAW

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
