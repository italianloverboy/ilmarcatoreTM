<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IL MARCATORE TM - Back to the Game(1080p)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; overflow: hidden; font-family: 'VT323', monospace; }
        canvas { display: block; image-rendering: pixelated; margin: auto; background: #010a14; }
        
        /* Scanlines CRT Bitmap Brothers Style */
        #crt-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%; pointer-events: none; z-index: 1000;
        }

        #header-ui { 
            position: absolute; top: 0; left: 50%; width: 1920px; height: 110px;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            border-bottom: 2px solid #00ffff;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.5);
            display: none; align-items: center; justify-content: space-around;
            z-index: 100;
            box-sizing: border-box;
        }
        .ui-segment { 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: space-between;
            position: relative; padding: 5px; min-width: 420px;
            height: 120px; box-sizing: border-box;
        }
        .ui-segment span { 
            font-weight: bold; font-size: 34px; color: #fff; 
            letter-spacing: 2px; text-align: center;
            height: 40px; line-height: 40px;
        }
        #label-hp { text-shadow: 0 0 10px #ff00ff, 0 0 25px #ff00ff; }
        #label-jacket { text-shadow: 0 0 10px #ff8800, 0 0 25px #ff8800; }
        #label-charge { text-shadow: 0 0 10px #00ffff, 0 0 25px #00ffff; }
        
        .icon-row { 
            min-height: 35px; font-size: 28px; display: flex; gap: 10px; 
            filter: drop-shadow(0 0 10px currentColor); 
            justify-content: center; width: 100%;
        }
        
        .bar-container { 
            width: 320px; height: 28px; background: rgba(0,0,0,0.8); border: 2px solid #00ffff; 
            box-shadow: 0 0 10px rgba(0,255,255,0.3);
            position: relative; overflow: hidden; margin: 2px 0;
        }
        /* Effetto Scanlines sulle barre */
        .bar-container::after {
            content: ''; position: absolute; top:0; left:0; width:100%; height:100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%);
            background-size: 100% 4px; pointer-events: none;
        }
        #hp-bar { width: 100%; height: 100%; background: #ff0000; box-shadow: 0 0 15px #ff0000; }
        #jacket-bar { width: 0%; height: 100%; background: #ffaa00; box-shadow: 0 0 15px #ffaa00; }

        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: transparent;
            color: #fff; display: flex; flex-direction: column; justify-content: flex-start; align-items: center; z-index: 200; 
            text-align: center; padding: 150px 100px; box-sizing: border-box;
            cursor: pointer; /* Indica che si può cliccare */
        }
        #overlay h1 { 
            font-size: 140px; color: #ff8800; margin: 0; letter-spacing: 8px;
            text-shadow: 4px 4px 0px #aa4400, 8px 8px 0px #000;
            filter: drop-shadow(0 0 20px rgba(255,136,0,0.5));
        }
        #overlay h2 { 
            font-size: 110px; color: #fff; margin: 0; letter-spacing: 5px;
            text-shadow: 0 0 15px #ff00ff, 0 0 30px #ff00ff;
            animation: neon-flicker 2s infinite;
        }
        @keyframes neon-flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; text-shadow: 0 0 15px #ff00ff, 0 0 30px #ff00ff; }
            20%, 24%, 55% { opacity: 0.7; text-shadow: none; }
        }
        #overlay p { font-size: 50px; line-height: 1.3; color: #ccd; max-width: 1400px; }
        .blink { animation: blink 0.5s infinite; color: #00ffff; font-size: 56px; margin-top: 40px; text-shadow: 0 0 15px #00ffff; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        #guru-box {
            position: absolute; top: 30%; left: 10%; width: 80%; height: 240px;
            border: 8px solid #ff0000; background: #000; color: #ff0000;
            display: none; justify-content: center; align-items: center;
            font-size: 70px; z-index: 300; animation: flash-red 0.1s infinite;
        }
        @keyframes flash-red { 0% { border-color: #ff0000; } 100% { border-color: #000; } }
    </style>
</head>
<body>

        </div>
        <div class="ui-segment">
            <span id="label-jacket">JACKET POWER</span>

            <div id="parts-ui" style="color: #00ff00;"><span style="color: #00ff00;">⚙</span> 00000</div>
        </div>

    <div id="guru-box">SOFTWARE FAILURE<br>GURU MEDITATION #00000004.0000AAC0</div>

    <div id="overlay">
        <div id="content">
            <h1>IL MARCATORE TM</h1>
            <h2>PIXELATED LOVE</h2>
            <p class="blink">CLICK TO INITIATE REBOOT</p>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>
    <audio id="bgm" src="Pixelated Love (Instrumental).mp3" loop></audio>
    <audio id="outro-bgm" src="Pixelated Love.mp3"></audio>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const header = document.getElementById('header-ui');
        const overlay = document.getElementById('overlay');
        const guruBox = document.getElementById('guru-box');

        // AUDIO ENGINE (Sintesi Procedurale stile Paula)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'jump') {
                osc.type = 'square'; osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(400, now + 0.1);
                gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.1);
                osc.start(); osc.stop(now + 0.1);
            } else if (type === 'shoot') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(800, now);
                osc.frequency.exponentialRampToValueAtTime(100, now + 0.2);
                gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.2);
                osc.start(); osc.stop(now + 0.2);
            } else if (type === 'hit') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(100, now);
                gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0, now + 0.1);
                osc.start(); osc.stop(now + 0.1);
            } else if (type === 'collect') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(600, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
                gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.1);
                osc.start(); osc.stop(now + 0.1);
            } else if (type === 'explosion') {
                const noise = audioCtx.createBufferSource();
                const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.3, audioCtx.sampleRate);
                const data = buf.getChannelData(0);
                for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
                noise.buffer = buf;
                const g2 = audioCtx.createGain();
                noise.connect(g2); g2.connect(audioCtx.destination);
                g2.gain.setValueAtTime(0.2, now); g2.gain.linearRampToValueAtTime(0, now + 0.3);
                noise.start(); noise.stop(now + 0.3);
            } else if (type === 'guru') {
                osc.type = 'square'; osc.frequency.setValueAtTime(440, now);
                osc.frequency.setValueAtTime(220, now + 0.1);
                osc.frequency.setTargetAtTime(440, now + 0.2, 0.1);
                gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0.1, now + 0.5);
                osc.start(); osc.stop(now + 0.5);
            }
        }

        const SCREEN_W = 1920;
        const SCREEN_H = 1080;
        let WORLD_W = 20000; 
        canvas.width = SCREEN_W;
        canvas.height = SCREEN_H;

        let gameState = 'MENU';
        let introStep = 0;
        let introStartTime = 0;
        let currentLevel = 1;
        const credits = [
             
            
          
            " ",
            "In a world of pixel dreams",
            "Hearts align with laser beams",
            "Lost inside a neon screen",
            "Love's a glitch or so it seems",
            " ",
            " ",
            " ",
            " ",
            " ",
            "8-bit love is all we need",
            "Digital hearts they often bleed",
            "Retro nights and endless speed",
            "Playing games at topmost creed",
            " ",
            " ",
            " ",
            " ",
            " ",
            "Pixelated love so true",
            "8-bit skies all shades of blue",
            "Tiny sprites just me and you",
            "Retro world we'll journey through",
            " ",
            " ",
            " ",
            " ",
            " ",
            "Binary stars they brightly shine",
            "Circuits spark love's grand design",
            "In this code our fates entwine",
            "Glitch or not you're always mine",
            " ",
            " ",
            " ",
            " ",
          
            "Arcade nights and joystick fights",
            "LEDs our northern lights",
            "In this game we find our might",
            "Pixel hearts in darkest nights",
            " ",
            " ",
            " ",
            " ",
            " ",
            " ",
            "Bit by bit our love's complete",
            "Counting zeros love's heartbeat",
            "Always win we never cheat",
            "In this game we can't be beat",
            " ",
            "X-----------------------------------------------------------------------X",
            "IL MARCATORE(TM) - Pixelated Love",
            "A gayme by TheRagMan ",
                        " ",
            "SPECIAL THANKS",
            "RGB_RagazziGaieBelli",
            " ",
            "IL MONDO E' SALVO ",
            "IL GIUBBINO E' ANDATO DISTRUTTO",
            "TUTTO BENE ",
      
        ];
        const introStory = [
            { h: "ONCE UPON<br>A TIME...", p: "", giant: true },
            { h: " 1978", p: " un pod arancione di origine aliena cade sulla terra... <br>...e prende le sembianze di un giubbino" },
            { h: " 1990", p: "Un giovane nerd trova il giubbino.<br>il POTERE di creare Hardware Failure istantanea.<br>Il CONTRAPPASSO: Donne in estasi.<br>Nasce la leggenda del Marcatore." },
            { h: " 2000", p: "Il giubbino viene sigillato nella villa del Produttore dell'Hardware per mitigare la maledizione.<br>Il Marcatore sceglie una vita normale... <br> fino ad oggi." },
            { h: "REBOOT", p: "I Robot hanno rapito la sua famiglia.<br>l'ultima speranza risiede nel suo passato oscuro<br>Recupera il giubbino. Distruggi i Robot. Salva il futuro." }
        ];

        let gameTime = 0, lives = 3, parts = 0, score = 0, camera = { x: 0 };
        let bullets = [], enemyBullets = [], particles = [], clothes = [], bubbles = [], barriers = [], entities = [], keys = {};
        let mousePos = { x: 0, y: 0 };
        let guruTimer = 0;

        // Fisica Superfrog 1080p
        const GRAVITY = 0.6;
        const JUMP_FORCE = -17;
        let SPEED = 6;

        let player = {
            x: 400, y: 700, w: 60, h: 120, vx: 0, vy: 0,
            hp: 100, maxHp: 100, jacketHp: 0, hasJacket: false, hasShoes: false, grounded: false, climbing: false, attachedTo: null,
            facing: 1, anim: 0, squash: 1, stretch: 1, stun: 0, energy: 0, hasSkates: false,
            hasSunglasses: false, canDoubleJump: false, spaceReleased: true,
            bubble: null, bubbleTimer: 0, shakeScore: 0, lastShakeDir: 0,
            deathTimer: 0, hidden: false, inLight: false, invTimer: 0,
            jacketColor: "#ff4400", isFake: false, shirtColor: "#666", shirtSymbol: 'heart', 
            shoeBaseColor: "#ffffff", shoeDetailColor: "#ff0000",
            punchTimer: 0, punchAngle: 0, punchPower: 0, maxX: 0, guruCount: 0, punchCooldown: 0,
            dialogueQueue: [], dialogueTimer: 0, isBarrierMode: false,
            dashTimer: 0, dashCooldown: 0 // Inizializzati ora!
        };
        let globalSpawnTimer = 0;

        let level = { platforms: [], poles: [], vines: [], spawnPoints: [], hidingSpots: [], walls: [], pits: [] };
        
        // Array Stati Luci Città (Performance Optimization)
        let cityLights = new Array(1000).fill(false).map(() => Math.random() > 0.7);

        function generateLevel() {
            const TILE = 32;
            WORLD_W = 15000 + (currentLevel * 5000); // Livelli sempre più lunghi
            level = { platforms: [], poles: [], vines: [], spawnPoints: [], hidingSpots: [], walls: [], pits: [] };
            level.platforms.push({ x: -3000, y: 960, w: WORLD_W + 3000, h: 120 });
            level.platforms.push({ x: -3000, y: 1080, w: WORLD_W + 3000, h: 1000 }); 
            
            // Piattaforme iniziali
            level.platforms.push({ x: 2000, y: 750, w: 400, h: 40 }); 
            
            let lastX = 800;
            let platformCount = 20 + (currentLevel * 10);
            for(let i=0; i<platformCount; i++) {
                let px = Math.floor((lastX + 150 + Math.random()*300) / TILE) * TILE;
                let py = Math.floor((650 + Math.random()*200) / TILE) * TILE;
                let pw = Math.floor((250 + Math.random()*500) / TILE) * TILE;
                level.platforms.push({ x: px, y: py, w: pw, h: TILE });
                
                // Più liane nei livelli avanzati
                if (Math.random() > (1.0 - currentLevel*0.1)) {
                    level.vines.push({ x: px + 100, y: 0, len: 15 + Math.floor(Math.random()*10), angle: 0 });
                }

                // Fosse e Muretti (Più frequenti avanti nel gioco)
                if (i > 2) {
                    if (Math.random() > 0.8) level.walls.push({ x: px + 100, y: 840, w: 40, h: 120 });
                    if (Math.random() > (0.9 - currentLevel*0.05)) level.pits.push({ x: px + pw/2, y: 960, w: 150 + currentLevel*20 });
                }

                if (Math.random() > 0.7) level.hidingSpots.push({ x: px + 50, y: py - 120 });
                if (Math.random() > 0.8) level.spawnPoints.push({ x: px + pw - 100, y: py - 120, count: 2 + currentLevel, regen: 600 - currentLevel*50 });
                
                lastX = px + pw;
            }

            // PALI INDIPENDENTI (Densità basata sul livello)
            let poleDist = 2200 - (currentLevel * 200);
            for(let x=1500; x<WORLD_W; x+=poleDist + Math.random()*500) {
                level.poles.push({ x: x, y: 360, h: 600, lit: (currentLevel < 3) });
            }
        }

        function initEntities() {
            generateLevel(); 
            let goalType = (currentLevel === 1) ? 'mansion' : 'teca';
            entities = [{ type: goalType, x: WORLD_W - 1000, y: 360, w: 800, h: 600, active: true }];
            
            // Spawn Scrigni (Casuali sulle piattaforme)
            level.platforms.forEach(p => {
                if (p.y < 900 && Math.random() > 0.7) { // 30% chance su piattaforme alte
                    entities.push({ type: 'chest', x: p.x + p.w/2 - 30, y: p.y - 60, w: 60, h: 60, hp: 3, active: true });
                }
            });
        }

        window.addEventListener('keydown', e => { 
            const bgm = document.getElementById('bgm');
            if (bgm && bgm.paused) {
                bgm.volume = 0.4;
                bgm.play().catch(e => console.log("Audio play blocked"));
            }
            
            // CHEATS: ALT + Numero (Numpad o Digit) per saltare i livelli
            if (e.altKey) {
                let target = -1;
                if (e.code === 'Numpad1' || e.code === 'Digit1') target = 1;
                if (e.code === 'Numpad2' || e.code === 'Digit2') target = 2;
                if (e.code === 'Numpad3' || e.code === 'Digit3') target = 3;
                if (e.code === 'Numpad4' || e.code === 'Digit4') target = 4;
                if (e.code === 'Numpad5' || e.code === 'Digit5') target = 5;

                if (target !== -1) {
                    e.preventDefault();
                    if (target <= 4) {
                        currentLevel = target;
                        startGame();
                    } else {
                        // Salto all'OUTRO
                        currentLevel = 4; // Base per l'outro
                        gameState = 'OUTRO';
                        player.winTime = gameTime;
                        overlay.style.display = 'none';
                        const bgm_inst = document.getElementById('bgm');
                        const bgm_outro = document.getElementById('outro-bgm');
                        if (bgm_inst) bgm_inst.pause();
                        if (bgm_outro) { bgm_outro.currentTime = 0; bgm_outro.play(); }
                        return;
                    }
                }
            }

            if (gameState === 'MENU') {
                nextIntro();
            } else if (gameState === 'STORY') nextIntro();
            else if (gameState === 'WIN') {
                currentLevel++;
                introStep = 0;
                nextIntro();
            } else if (gameState === 'GAMEOVER' || gameState === 'OUTRO') {
                if (gameTime > player.winTime + 120) location.reload();
            }
            keys[e.code] = true; 
            if (e.key === 'Shift') keys['Shift'] = true;
        });
        window.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mousePos.x = e.clientX - rect.left;
            mousePos.y = e.clientY - rect.top;
        });
        window.addEventListener('contextmenu', e => e.preventDefault()); // Blocca menu Windows
        window.addEventListener('mousedown', (e) => { 
            const bgm = document.getElementById('bgm');
            if (bgm && bgm.paused) {
                bgm.volume = 0.4;
                bgm.play().catch(e => console.log("Audio play blocked"));
            }

            if (gameState === 'MENU' || gameState === 'STORY') nextIntro(); 
            else if (gameState === 'WIN') {
                currentLevel++;
                introStep = 0;
                nextIntro();
            } else if (gameState === 'GAMEOVER' || gameState === 'OUTRO') {
                if (gameTime > player.winTime + 120) location.reload();
            }
            else if (gameState === 'PLAY' && player.stun <= 0 && player.punchCooldown <= 0 && !player.crouching) {
                if (e.button === 0 || e.button === 2) {
                    player.charging = true; 
                    player.isBarrierMode = (e.button === 2);
                }
            }
        });
        window.addEventListener('keyup', (e) => { 
            keys[e.code] = false; 
            if (e.key === 'Shift') keys['Shift'] = false;
        });
        window.addEventListener('mouseup', (e) => {
            if (gameState === 'PLAY' && player.charging) {
                player.charging = false;
                let dx = (mousePos.x + camera.x) - (player.x + 30);
                let dy = mousePos.y - (player.y + 40);
                let angle = Math.atan2(dy, dx);
                player.punchAngle = angle;
                player.punchTimer = 20;
                player.punchPower = player.energy;
                
                if (player.isBarrierMode && player.hasJacket && !player.isFake && player.energy > 5) {
                    // SPAWN BARRIERA (RMB + Giubbino Vero) - MAX 2
                    if (barriers.length < 2) {
                        let dirX = Math.cos(player.punchAngle) > 0 ? 1 : -1;
                        barriers.push({
                            x: player.x + (dirX * 100), y: player.y,
                            w: 20, h: 120, hp: Math.max(50, player.energy), maxHp: Math.max(50, player.energy),
                            timer: 0, dead: false
                        });
                        playSound('shoot');
                    }
                } else if (player.energy > 10) {
                    // PUGNO NORMALE
                    playSound('shoot');
                    // Guru Meditation: consuma 1 slot se disponibile (SOLO SE AL MAX PER 1 SECONDO)
                    if (player.energy >= 110 && player.hasJacket && !player.isFake && player.guruCount > 0 && player.maxChargeTimer >= 60) {
                        triggerGuru();
                        player.guruCount--;
                        player.jacketHp -= 50; 
                        player.maxChargeTimer = 0;
                    } else if (player.hasJacket) {
                        let speed = 10 + player.energy/5;
                        if (player.energy < 40 || player.isFake) {
                            let pwr = player.energy + (player.isFake ? 60 : 20);
                            bullets.push({ 
                                x: player.x + 30, y: player.y + 40, 
                                vx: Math.cos(angle) * 8, vy: Math.sin(angle) * 8, 
                                life: 10, power: pwr, melee: true, 
                                color: player.jacketColor, hitList: [] 
                            });
                        } else {
                            let bCol = "#00ffff";
                            if (player.energy > 80) bCol = "#ffff00";
                            bullets.push({
                                x: player.x + 30, y: player.y + 40, 
                                vx: Math.cos(angle) * speed, 
                                vy: Math.sin(angle) * speed, 
                                power: player.energy,
                                color: bCol, melee: false, hitList: []
                            });
                            bullets.push({ x: player.x + 30, y: player.y + 40, vx: Math.cos(angle) * 8, vy: Math.sin(angle) * 8, life: 10, power: player.energy + 20, melee: true, hitList: [] });
                            player.jacketHp -= player.energy / 5;
                        }
                    } else {
                        bullets.push({ x: player.x + 30, y: player.y + 40, vx: Math.cos(angle) * 8, vy: Math.sin(angle) * 8, life: 10, power: player.energy + 20, melee: true, hitList: [] });
                    }
                }
                player.energy = 0;
                player.punchCooldown = 20; 
            }
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        function nextIntro() {
            gameState = 'STORY'; 
            introStartTime = gameTime;
            let titleStyle = "font-size: 250px; margin-top: 50px; color: #ff8800; text-shadow: 4px 4px 0px #aa4400;";
            let overlayContent = overlay.querySelector('#content');

            if (currentLevel === 1) {
                if (introStep < introStory.length) {
                    let s = introStory[introStep];
                    overlayContent.innerHTML = `<div style="margin-top: -20px;"><h1 id="intro-title" style="${titleStyle}">${s.h}</h1><p style="font-size: 40px; margin-top: 10px;">${s.p}</p></div>`;
                    overlay.style.display = 'flex';
                    introStep++;
                } else {
                    startGame();
                    return;
                }

        function drawBubble(x, y, text, dir = 'left') {
            let cx = x - camera.x;
            ctx.save();
            ctx.font = "32px VT323, monospace";
            const MAX_W = 250; 
            let words = text.split(' ');
            let lines = [];
            let currentLine = "";

            words.forEach(word => {
                let testLine = currentLine + (currentLine ? " " : "") + word;
                if (ctx.measureText(testLine).width > MAX_W && currentLine) {
                    lines.push(currentLine);
                    currentLine = word;
                } else {
                    currentLine = testLine;
                }
            });
            lines.push(currentLine);

            let maxLineW = 0;
            lines.forEach(l => {
                let w = ctx.measureText(l).width;
                if (w > maxLineW) maxLineW = w;
            });
            
            let bubbleW = Math.max(120, maxLineW / 2 + 40);
            let h = 40 + lines.length * 35;
            
            ctx.fillStyle = "#fff"; 
            ctx.beginPath(); 
            ctx.ellipse(cx+160, y-120, bubbleW, h/2 + 25, 0, 0, Math.PI*2); 
            ctx.fill();
            
            ctx.beginPath(); 
            if (dir === 'left') {
                ctx.moveTo(cx+30, y-20); ctx.lineTo(cx+80, y-80); ctx.lineTo(cx+50, y-80); 
            } else {
                // Coda che punta verso l'esterno a destra
                ctx.moveTo(cx+290, y-20); ctx.lineTo(cx+240, y-80); ctx.lineTo(cx+270, y-80); 
            }
            ctx.fill();
            
            ctx.fillStyle = "#000"; ctx.textAlign = "center"; 
            lines.forEach((line, i) => {
                ctx.fillText(line, cx+160, y-120 + (i - (lines.length-1)/2) * 35 + 10);
            });
            ctx.restore();
        }

        let attachedCount = 0; // Cache globale per il frame

        let activeBubbles = 0;
        function updateBubbleCount() {
            activeBubbles = (player.bubbleTimer > 0 ? 1 : 0);
            entities.forEach(en => { if (en.bubbleTimer > 0) activeBubbles++; });
        }
        function canSpeak() { return activeBubbles < 5; }

        function update() {
            gameTime++;
            if (gameTime % 60 === 0) {
                // Pesca e cambia stato a una luce a caso ogni secondo
                let idx = Math.floor(Math.random() * cityLights.length);
                cityLights[idx] = !cityLights[idx];
            }
            if (player.invTimer > 0) player.invTimer--;
            if (player.tutorialTimer > 0) player.tutorialTimer--;
            updateBubbleCount(); // Calcolato UNA VOLTA sola per frame

            // Gestione Dialoghi Sequenziali (FUORI DAI LOOP)
            if (player.dialogueTimer > 0) player.dialogueTimer--;
            if (gameState === 'PLAY' && player.dialogueTimer <= 0 && player.dialogueQueue.length > 0 && canSpeak()) {
                player.bubble = player.dialogueQueue.shift();
                player.bubbleTimer = 180;
                player.dialogueTimer = 120; // Intervallo tra frasi
            }
            
            attachedCount = 0;
            entities.forEach(en => {
                // Sanificazione: solo le donne vive possono essere 'attached'
                if (en.type !== 'woman' || en.state === 'dead' || en.state === 'fallen') {
                    en.attached = false;
                }
                if (en.type === 'woman' && en.attached) attachedCount++;
            });
            
            if (gameState === 'DEAD') {
                player.deathTimer++;
                // Logica di respawn gestita qui, ma il disegno va in draw()
                if (player.deathTimer > 240 && keys['Space']) {
                    lives--;
                    if (lives < 0) {
                        gameState = 'GAMEOVER';
                        overlay.style.display = 'flex';
                        overlay.querySelector('#content').innerHTML = "<h1>GAME OVER</h1><p class='blink'>CLICK TO REBOOT</p>";
                    } else {
                        gameState = 'PLAY';
                        resetLevel();
                    }
                }
            }
            if (gameState !== 'PLAY' && gameState !== 'DEAD') return;
            entities = entities.filter(en => en.hp === undefined || en.hp > 0 || en.state === 'dead');

            if (gameState === 'PLAY') {
                if (player.hp <= 0) {
                    gameState = 'DEAD'; player.deathTimer = 0; player.vx = 0; player.vy = 0;
                }

                if (globalSpawnTimer > 0) globalSpawnTimer--;
                level.spawnPoints.forEach(sp => {
                    if (sp.count < 3) { sp.regen--; if(sp.regen<=0) { sp.count++; sp.regen=600; } }
                });

                player.inLight = false;
                level.poles.forEach(p => { if(p.lit && Math.abs(player.x+30 - (p.x+10)) < 200) player.inLight = true; });
                
                player.hidden = false;
                level.hidingSpots.forEach(s => {
                    if (Math.abs(player.x+30 - s.x-30) < 50 && keys['KeyW']) player.hidden = true;
                });

                if (Math.abs(player.vx) < 0.1 && Math.abs(player.vy) < 0.1 && !player.hidden) {
                    player.idleTimer = (player.idleTimer || 0) + 1;
                } else {
                    player.idleTimer = 0;
                }

                // Popolamento dinamico costante
                if (gameTime % 120 === 0) {
                    let nearEnemies = 0;
                    for(let en of entities) {
                        const isHumanoid = ['alpha', 'passerby', 'nerd', 'disguise'].includes(en.type);
                        if((en.type==='woman'||en.type==='robot'||isHumanoid) && Math.abs(en.x - player.x) < 1000) nearEnemies++;
                    }
                    if (nearEnemies < 5) spawnEnemy(); 
                }

                entities = entities.filter(en => en.hp === undefined || en.hp > 0 || en.state === 'dead');                
                entities.forEach((en, idx) => {
                    // Gestione universale timer fumetti (anche per i morti)
                    if (en.bubbleTimer > 0) en.bubbleTimer--;
                    
                    // IA CULLING: Se troppo lontano dal giocatore, non processare IA per risparmiare CPU
                    if (Math.abs(en.x - player.x) > 2500 && en.type !== 'mansion') return;

                    // IA Evitamento Ultra-Light (ottimizzata)
                    const isH = ['alpha', 'passerby', 'nerd', 'disguise'].includes(en.type);

                    // Logica di Separazione (Evita sovrapposizione totale tra umanoidi e robot)
                    if (en.state !== 'dead' && en.state !== 'spawning' && !en.attached && (en.type === 'robot' || isH || en.type === 'woman')) {
                        for(let j = idx + 1; j < entities.length; j++) {
                            let other = entities[j];
                            if (other.state === 'dead' || other.attached || other.state === 'spawning') continue;
                            if (other.type === 'robot' || ['alpha', 'passerby', 'nerd', 'disguise', 'woman'].includes(other.type)) {
                                let dx = en.x - other.x;
                                if (Math.abs(dx) < 35 && Math.abs(en.y - other.y) < 50) {
                                    let push = (35 - Math.abs(dx)) * 0.2;
                                    let dir = dx > 0 ? 1 : -1;
                                    en.x += dir * push;
                                    other.x -= dir * push;
                                }
                            }
                        }
                    }
                    
                    if ((gameTime + idx) % 10 === 0 && (en.type === 'robot' || isH || (en.type === 'woman' && en.state === 'patrol'))) {
                        // Check rapido: inverte se tocca un muro o è vicino a una fossa
                        for(let p of level.pits) { if(Math.abs(en.x - p.x) < 80) { en.dir *= -1; break; } }
                        for(let w of level.walls) { if(Math.abs(en.x - w.x) < 50) { en.dir *= -1; break; } }
                    }

                    if (en.state === 'spawning') {
                        en.timer--; en.y -= 2;
                        if (en.timer <= 0) { en.state = 'patrol'; en.y = 840; }
                        return;
                    }                
                    if (en.type === 'woman') {
                        if (en.state === 'fallen') {
                            en.stun--;
                            en.x += en.vx; en.vx *= 0.95;
                            en.y += en.vy; en.vy += 0.5;
                            if (en.y > 840) { en.y = 840; en.vy = 0; }
                            if (en.stun <= 0) en.state = (en.inv.length === 0) ? 'escaping' : 'retrieving';
                            return;
                        }
                        if (en.stun > 0) { 
                            en.stun--; 
                            // Fisica di sbalzo: gravità e inerzia sempre attive
                            en.x += en.vx; en.vx *= 0.95;
                            en.y += en.vy; en.vy += 0.5; 
                            if (en.y > 840) { en.y = 840; en.vy = 0; }
                            return; 
                        }
                        if (en.bubbleCooldown > 0) en.bubbleCooldown--;
                        let womanSpeed = (en.state === 'berserk') ? 5 : 3;
                        let distH = Math.abs(player.x - en.x);
                        let isAbove = (player.y + player.h) < (en.y + 20); 
                        // Gestione distacco forzato e perdita LOS
                        if (!player.hasJacket || distH > 800 || isAbove || player.climbing || player.attachedTo) {
                            if (en.attached) { en.attached = false; }
                            en.bubbleTimer = 0; 
                            
                            if (en.state === 'undressing') {
                                en.state = 'retrieving'; 
                            } else if (en.state === 'berserk') {
                                en.state = 'escaping'; // Se nuda e perde il target, scappa per imbarazzo
                            }
                        }

                        // Logica quando è attaccata
                        if (en.attached) {
                            en.x = player.x - (15 * player.facing); en.y = player.y;
                            if (Math.abs(player.vx) < 0.1 && Math.abs(player.vy) < 0.1) {
                                player.hp = Math.min(100, player.hp + 0.3);
                                player.jacketHp -= 0.8;
                            }
                            if (player.shakeScore > 100) {
                                en.attached = false; 
                                en.state = 'fallen';
                                en.stun = 180; // 3 secondi di stasi
                                en.vx = -player.facing * 15; // Sbalzo laterale
                                en.vy = -10; // Salto di caduta
                                player.shakeScore = 0; spawnParticles(en.x, en.y, "#ff00ff", 10);
                            }
                            if (player.jacketHp <= 0) { 
                                en.attached = false; player.hasJacket = false; 
                                spawnParticles(player.x+30, player.y+60, "#ff4400");
                                player.bubble = "che due collioni"; player.bubbleTimer = 300;
                            }
                            return;
                        }

                        // Gestione Stati IA
                        if (en.state === 'retrieving') {
                            let target = clothes.find(c => c.onGround && !c.picked);
                            if (target) {
                                en.x += Math.sign(target.x - en.x) * womanSpeed;
                                if (Math.abs(en.x - target.x) < 30) { 
                                    target.picked = true; en.inv.push(target.type); 
                                    if (en.inv.length >= 4) en.state = 'patrol'; // Scarpe + intimo + vestito
                                }
                            } else { 
                                if (en.inv.length === 0) {
                                    en.state = 'escaping';
                                    en.dir = Math.sign(en.x - player.x);
                                } else {
                                    en.state = 'patrol'; 
                                }
                            }
                        } else if (en.state === 'escaping') {
                            if (!en.dir) en.dir = Math.sign(en.x - player.x);
                            en.x += en.dir * 8; 
                            if (en.x < camera.x - 400 || en.x > camera.x + SCREEN_W + 400) en.hp = -1;
                        } else if (en.state === 'patrol') {
                            // Attrazione solo se giubbino VERO
                            if (player.hasJacket && !player.isFake && Math.abs(player.x-en.x) < 800 && !player.climbing && !isAbove) {
                                en.state = 'undressing';
                                if (en.bubbleCooldown <= 0) {
                                    let uCount = 2 + Math.floor(Math.random()*5);
                                    en.bubble = "U" + "u".repeat(uCount) + "h il Marcatore™";
                                    en.bubbleTimer = 180; en.bubbleCooldown = 600;
                                }
                            }
                            en.x += en.dir * womanSpeed; if (Math.random() < 0.01) en.dir *= -1;

                        player.grounded = false; player.stretch = 1.3; 
                        player.spaceReleased = false;
                        player.canDoubleJump = true;
                        playSound('jump');
                    } else if (player.hasShoes && player.canDoubleJump && player.spaceReleased) {
                        player.vy = JUMP_FORCE * 0.8;
                        player.canDoubleJump = false;
                        player.spaceReleased = false;
                        player.stretch = 1.5;
                        spawnParticles(player.x+30, player.y+100, "#ffffff", 5);
                        playSound('jump');
                    }
                } else {
                    player.spaceReleased = true;
                }
                player.vy += GRAVITY;
            } else if (player.attachedTo) {
                let v = player.attachedTo;
                if (keys['KeyW']) player.vOffset = Math.max(0.1, player.vOffset - 0.015);
                if (keys['KeyS']) player.vOffset = Math.min(1.0, player.vOffset + 0.015);
                let ropeLen = v.len * 32; 
                player.x = v.x + Math.sin(v.angle) * ropeLen * player.vOffset - 30;
                player.y = v.y + Math.cos(v.angle) * ropeLen * player.vOffset - 60;
                player.vx = 0; player.vy = 0;
                if (keys['Space']) { 
                    player.attachedTo = null; player.climbing = false;
                    player.vy = -16; let swingImpulse = Math.sin(v.angle) * 12;
                    let dirImpulse = 0; if (keys['KeyA']) dirImpulse = -SPEED * 1.5; else if (keys['KeyD']) dirImpulse = SPEED * 1.5;
                    player.vx = swingImpulse + dirImpulse;
                }
            } else if (player.climbing) {
                player.vx = 0; if (keys['KeyW']) player.vy = -6; else if (keys['KeyS']) player.vy = 6; else player.vy = 0;
                if (keys['Space'] || keys['KeyA'] || keys['KeyD']) { player.climbing = false; player.vy = -8; }
                level.poles.forEach(p => { if (Math.abs(player.x+30 - p.x) < 40) { if (player.y < p.y - 80) player.y = p.y - 80; if (player.y + player.h > p.y + p.h) { player.y = p.y + p.h - player.h; player.climbing = false; } } });
            }

            player.x += player.vx; player.y += player.vy;
            player.stretch += (1 - player.stretch) * 0.12; player.squash += (1 - player.squash) * 0.12;

            player.grounded = false;
            if (!player.climbing) {
                level.platforms.forEach(p => {
                    if (player.x + player.w > p.x && player.x < p.x + p.w && player.y + player.h > p.y && player.y < p.y + p.h) {
                        if (player.vy > 0 && player.y + player.h - player.vy <= p.y) { player.y = p.y - player.h; player.vy = 0; player.grounded = true; }
                    }
                });

                // Collisione Muretti (Laterale)
                level.walls.forEach(w => {
                    if (player.x + player.w > w.x && player.x < w.x + w.w && player.y + player.h > w.y && player.y < w.y + w.h) {
                        if (player.vx > 0) player.x = w.x - player.w;
                        else if (player.vx < 0) player.x = w.x + w.w;
                        player.vx = 0;
                    }
                });

                // Collisione Fosse (Instadeath)
                level.pits.forEach(pit => {
                    if (Math.abs(player.x + 30 - pit.x) < pit.w/2 && Math.abs(player.y + 110 - pit.y) < 20) {
                        player.hp = 0; // CADUTO NELLA FOSSA
                    }
                });
            }

            level.poles.forEach(p => { if (Math.abs(player.x+30 - p.x) < 40 && player.y+player.h > p.y && player.y < p.y+p.h) { if (keys['KeyW']) player.climbing = true; } });
            level.vines.forEach(v => { 
                v.angle = Math.sin(gameTime*0.02) * 0.5; 
                // Fisca Liane (Spostata da Draw ad Update)
                if (!player.attachedTo && player.vy > 0) {
                    for(let k=0.1; k<=1.0; k+=0.1) {
                        let segX = v.x + Math.sin(v.angle) * v.len * 32 * k;
                        let segY = v.y + Math.cos(v.angle) * v.len * 32 * k;
                        if (Math.hypot(player.x+30-segX, player.y-segY) < 50) {
                            player.attachedTo = v; player.climbing = true;
                            player.vOffset = k;
                            break;
                        }
                    }
                }
            });

            player.maxX = Math.max(player.maxX || 400, player.x);
            camera.x = player.x - SCREEN_W/2;
            if (camera.x < -2000) camera.x = -2000;
            if (camera.x > WORLD_W - SCREEN_W) camera.x = WORLD_W - SCREEN_W;
            
            // Muro invisibile basato sul punto massimo raggiunto (maxX)
            let wallLimit = player.maxX - 4000;
            if (player.x < wallLimit) { player.x = wallLimit; player.vx = 0; }
            if (player.x < -3000) player.x = -3000;
            if (player.charging) { 
                // AGGIORNAMENTO SGUARDO 4 DIREZIONI IN TEMPO REALE
                let dx = (mousePos.x + camera.x) - (player.x + 30);
                let dy = mousePos.y - (player.y + 40);
                player.punchAngle = Math.atan2(dy, dx);
                if (Math.abs(dx) > Math.abs(dy)) {
                    player.lookDir = (dx > 0) ? 0 : 2; // DX o SX
                } else {
                    player.lookDir = (dy > 0) ? 1 : 3; // Giù o Su
                }

                // Carica esponenziale: rallenta drasticamente verso la fine
                let inc = Math.max(0.1, 2.0 * (1 - player.energy / 150));
                player.energy += inc; 
                
                let maxEnergy = 140;
                if (player.isFake) maxEnergy = 60; // Il giubbino falso non regge oltre il primo tier
                if (player.energy > maxEnergy) player.energy = maxEnergy; 
                
                // Timer per Guru Meditation (deve stare al max per 1 secondo)
                if (player.energy >= 110 && !player.isFake) {
                    player.maxChargeTimer = (player.maxChargeTimer || 0) + 1;
                } else {
                    player.maxChargeTimer = 0;
                }

                if (player.energy >= 140 && !player.hasJacket) {
                    player.stun = 120; player.energy = 0; player.charging = false;
                    player.bubble = "ANF... ANF..."; player.bubbleTimer = 60;
                }
                if (player.hasJacket) {
                    let pCol = player.isFake ? player.jacketColor : "#00ffff"; 
                    if (!player.isFake) {
                        if (player.energy > 110) pCol = "#ffffff"; 
                        else if (player.energy > 60) pCol = "#ffff00";
                    }
                    if (player.energy > 40 && gameTime % 5 === 0) particles.push({ x: player.x+30, y: player.y+40, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 20, color: pCol });
                }
            } else { 
                player.energy = 0; if (player.hasJacket && Math.abs(player.vx) < 1 && player.grounded) player.jacketHp = Math.min(100, player.jacketHp + 0.05);
            }

            clothes = clothes.filter(c => !c.picked);
            clothes.forEach((c, i) => { 
                if (!c.onGround) { c.vy += 0.4; c.x += c.vx; c.y += c.vy; if (c.y >= 930) { c.y = 930; c.onGround = true; c.vx = 0; c.vy = 0; } }
                if (Math.hypot(player.x - c.x, player.y+50 - c.y) < 60) { if (!c.onGround) { player.stun = 15; clothes.splice(i,1); } else { c.picked = true; parts += 5; score += 10; } }
            });

            if (player.punchTimer > 0) player.punchTimer--;

            if (gameState === 'PLAY' && player.x > WORLD_W - 500) {
                if (currentLevel === 4) {
                    gameState = 'OUTRO';
                    player.winTime = gameTime;
                    overlay.style.display = 'none';
                    const bgm_inst = document.getElementById('bgm');
                    const bgm_outro = document.getElementById('outro-bgm');
                    if (bgm_inst) bgm_inst.pause();
                    if (bgm_outro) { bgm_outro.currentTime = 0; bgm_outro.play(); }
                } else {
                    gameState = 'WIN'; 
                    player.winTime = gameTime;
                    overlay.style.display = 'flex';
                    overlay.querySelector('#content').innerHTML = `<div style="margin-top: 10vh;"><h2>LEVEL COMPLETE</h2><p class='blink' style='margin-top:100px'>PREMI SPAZIO PER IL LIVELLO ${currentLevel + 1}</p></div>`;
                }
                player.vx = 0; player.vy = 0;
            }
            if (player.punchCooldown > 0) player.punchCooldown--;
            if (player.y > SCREEN_H + 200 && gameState !== 'DEAD') { gameState = 'DEAD'; player.deathTimer = 0; player.vx = 0; player.vy = 0; }
        } // Fine PLAY
        
        if (player.bubbleTimer > 0) player.bubbleTimer--; 
        document.getElementById('label-hp').innerText = "BODY INTEGRITY: " + Math.ceil(player.hp) + "%";
        document.getElementById('hp-bar').style.width = (player.hp / player.maxHp * 100) + "%";
        document.getElementById('jacket-bar').style.width = player.jacketHp + "%";
        
        // Update Punch Charge Bar
        let cBar = document.getElementById('charge-bar');
        cBar.style.width = (player.energy / 1.4) + "%"; // player.energy va da 0 a 140
        let cCol = "#00ffff";
        if (player.energy > 110) cCol = "#ffffff";
        else if (player.energy > 60) cCol = "#ffff00";
        cBar.style.background = cCol;
        cBar.style.boxShadow = "0 0 15px " + cCol;

        // Update Dynamic Icons (Hearts, Chips, Floppies)
        const updateIcons = (id, char, count, max=3) => {
            let s = "";
            for(let i=0; i<max; i++) {
                if (i < count) s += char;
                else s += `<span style="opacity: 0.2">${char}</span>`;
            }
            document.getElementById(id).innerHTML = s;
        };

        updateIcons('lives-icons', '❤', lives);
        updateIcons('chips-icons', '⚙', parts, 5); 
        updateIcons('floppy-icons', '💾', player.guruCount, 5); 
        
        document.getElementById('parts-ui').innerHTML = "";
        document.getElementById('score-ui').innerText = "PTS: " + String(score).padStart(8, '0');
        // --- UPDATE BARRIERE (Another World Style) ---
        barriers = barriers.filter(b => b.hp > 0);
        barriers.forEach(b => {
            // Decadimento: più veloce se ne hai 2
            let decay = 0.2 * (barriers.length > 1 ? 2.5 : 1.0);
            b.hp -= decay;
            
            // Collisione con Proiettili Nemici
            enemyBullets.forEach(eb => {
                if (Math.abs(eb.x - b.x) < 30 && eb.y > b.y && eb.y < b.y + b.h) {
                    eb.dead = true;
                    b.hp -= eb.isLaser ? 15 : 5;
                    spawnParticles(eb.x, eb.y, "#ff4400", 5);
                }
            });
            
            // Interazione con Entità (Collisione Fisica Barriera)
            entities.forEach(en => {
                if (en.state === 'dead') return;
                // Check collisione orizzontale e verticale
                let enCenterX = en.x + 30;
                if (Math.abs(enCenterX - b.x) < 45 && en.y + 120 > b.y && en.y < b.y + b.h) {
                    // BLOCCA FISICAMENTE (Tutti i nemici umanoidi e robot)
                    let isBlockable = ['woman', 'robot', 'alpha', 'nerd', 'disguise'].includes(en.type);
                    if (isBlockable) {
                        let pushDir = Math.sign(enCenterX - b.x);
                        en.x = b.x + (pushDir * 45) - 30;
                        en.vx = 0;
                        
                        // Danno alla barriera
                        if (gameTime % 15 === 0) {
                            if (en.type === 'robot') b.hp -= 2.0;
                            else if (en.state === 'berserk' || en.isFurious) b.hp -= 1.0;
                            spawnParticles(enCenterX, en.y+60, "#ff4400", 3);
                        }
                    }
                }
            });
        });
    }

    function drawHumanoid(x, y, color, type, anim, extra = {}) {
            let cx = extra.ignoreCamera ? x : (x - camera.x);
            let sx = (type === 'player') ? player.stretch : 1;
            let sy = (type === 'player') ? player.squash : 1;
            ctx.save(); // Save main humanoid translation
            ctx.save(); // Save for crouch scaling

            if (gameState === 'DEAD' && type === 'player') {
                ctx.translate(cx + 30, y + 120); 
                if (player.deathTimer < 120) {
                    let spin = Math.cos(player.deathTimer * 0.15); 
                    ctx.scale(sx * -player.facing * spin, sy); // Invertito per fix mirroring
                } else {
                    ctx.rotate(Math.PI/2); 
                }
                ctx.translate(-30, -120);
            } else {
                ctx.translate(cx + 30, y + 120); 
                let d = (type === 'player') ? -player.facing : (extra.dir || 1);
                if (extra.state === 'dead' || extra.state === 'fallen') {
                    ctx.rotate(Math.PI/2); // Girato in orizzontale
                    ctx.translate(0, -30); // Aggiustamento per stare sul pavimento
                }
                // EFFETTO CAPRIOLA IN DASH (Un giro completo sincronizzato)
                if (type === 'player' && player.dashTimer > 0) {
                    let total = (Math.abs(player.vx) > 0.1) ? 30 : 20;
                    let progress = (total - player.dashTimer) / total;
                    ctx.rotate(progress * Math.PI * 2 * player.facing);
                }
                ctx.scale(sx * d, sy); // Mirroring universale
                ctx.translate(-30, -120);
            }

            // --- CROUCH LOGIC ---
            let isPlayerCrouched = (type === 'player' && player.crouching) || extra.crouching;
            if (isPlayerCrouched) {
                ctx.translate(30, 120); // Pivot ai piedi
                ctx.scale(1, 0.6);
                ctx.translate(-30, -120);
            }
            
            // Testa & Dettagli (Nerd / Donna / Robot)
            let skinColor = (extra.colors && extra.colors.skin) ? extra.colors.skin : "#ffdbac";
            if (type === 'robot') ctx.fillStyle = "#777";
            else {
                // Faccia BLU se stordito (Overheat), ROSSA se carica
                if (type === 'player' && player.stun > 0 && !player.hasJacket) {
                    let blueInt = player.stun / 120;
                    let r = Math.floor(255 * (1 - blueInt));
                    let g = Math.floor(219 * (1 - blueInt) + 255 * blueInt);
                    let b = Math.floor(172 * (1 - blueInt) + 255 * blueInt);
                    ctx.fillStyle = `rgb(${r},${g},${b})`; 
                } else if (type === 'player' && player.energy > 0 && !player.hasJacket) {
                    let r = 255;
                    let g = Math.floor(219 * (1 - player.energy / 100));
                    let b = Math.floor(172 * (1 - player.energy / 100));
                    ctx.fillStyle = `rgb(${r},${g},${b})`;
                } else ctx.fillStyle = skinColor;
            }
            if (type === 'player') ctx.fillRect(14, 0, 34, 40); // Testa snellita sul retro (era 36)
            else ctx.fillRect(10, 0, 40, 40);
            
            if (type === 'player') {
                ctx.fillStyle = "#000"; ctx.fillRect(14, 0, 34, 10); // Capelli ridotti e riallineati
                let mj = (extra.hasJacket !== undefined) ? extra.hasJacket : player.hasJacket;
                if (!mj) {
                    ctx.fillStyle = "#fff"; ctx.fillRect(14, 10, 12, 10); ctx.fillRect(32, 10, 12, 10); // Lenti
                    ctx.fillStyle = "#000"; ctx.fillRect(13, 14, 1, 2); // Spunta frontale minima (1x2)
                    let isGuruReady = player.energy >= 110 && player.hasJacket && !player.isFake && player.guruCount > 0 && player.maxChargeTimer >= 60;
                    ctx.fillStyle = isGuruReady ? "#ff0000" : (player.charging && gameTime % 10 < 5 ? "#00ffff" : "#000"); 
                    ctx.fillRect(18, 14, 4, 4); ctx.fillRect(36, 14, 4, 4); // Occhi spostati
                    ctx.fillStyle = "#000"; ctx.fillRect(26, 14, 6, 2); // Ponte (Bridge)
                    ctx.fillRect(44, 14, 6, 2); // Asticella laterale (Arm/Temple)
                    
                    // Occhiali da Sole se posseduti
                    if (player.hasSunglasses) {
                        ctx.fillStyle = "#000"; 
                        ctx.fillRect(10, 10, 44, 12); // Montatura scura

                } else if (player.charging) {

                    if (player.lookDir === 0) ox = 5;       // Right
                    else if (player.lookDir === 2) ox = -5; // Left
                    else if (player.lookDir === 1) oy = 5;  // Down
                    else if (player.lookDir === 3) oy = -5; // Up
                    
                    // Compensazione mirroring per asse X
                    if (player.facing === 1 && (player.lookDir === 0 || player.lookDir === 2)) {
                        ox = -ox;

                    ctx.fillStyle = isGuruReady ? "#ff0000" : ((gameTime % 10 < 5) ? "#00ffff" : "#000");

            } else if (['alpha', 'passerby', 'nerd', 'disguise'].includes(type)) {
