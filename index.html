<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IL MARCATORE TM - CRACKTRO STABLE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background: #000; overflow: hidden; 
            font-family: 'Press Start 2P', monospace; 
            cursor: pointer;
        }
        
        #amiga-canvas { display: block; width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        
        #overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; align-items: center; justify-content: center; 
            background: #000; color: #0f0; z-index: 10; text-align: center; line-height: 2; 
        }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div id="overlay">
        <div>
            <h2 style="color: #ffff00; text-shadow: 2px 2px #ffaa00;">IL MARCATORE TM</h2>
            <p id="click-msg" class="blink">Please insert volume System in any drive</p>
        </div>
    </div>

    <canvas id="amiga-canvas"></canvas>

    <script type="module">
        import { initStrudel, evaluate } from 'https://cdn.jsdelivr.net/npm/@strudel/web/+esm';

        // Mappa pulita per Strudel
        const tr808Map = {
            'bd': 'bd.wav', 'sn': 'sn.wav', 'hh': 'hh.wav', 'oh': 'oh.wav',
            'cp': 'cp.wav', 'rim': 'rim.wav', 'cb': 'cb.wav', 'cl': 'cl.wav'
        };

        // CODICE PULITO: niente punti e virgola, sintassi funzionale pura
        const strudelCode = `
samples({'myvox':['0.wav','1.wav','2.wav','3.wav','4.wav','5.wav','6.wav','7.wav','8.wav','9.wav','10.wav','11.wav','12.wav']}, 'https://cdn.jsdelivr.net/gh/italianloverboy/uuh@main/samples/')

samples(${JSON.stringify(tr808Map)}, 'https://strudel.cc/samples/RolandTR808/')

setcpm(75/4)

stack(
  s("[~ ~ bd ~] [~ ~ bd ~]").bank("RolandTR808").lpf(800).room(0.2).gain(1.2), 
  s("[~ sn ~ ~] [~ sn ~ ~]").bank("RolandTR808").room(0.4).gain(0.8),
  s("hh*8").bank("RolandTR808").decay(0.02).gain(0.4).pan(sine.slow(4)),
  note("<[c2 ~ g1 ~] [c2 ~ g1 f1] [bb1 ~ f1 ~] [bb1 ~ g1 bb1]>").s("saw").lpf(400).lpq(10).decay(0.4).gain(0.9),
  note("<[~ c3 ~ c3] [~ c3 ~ c3] [~ f3 ~ f3] [~ f3 ~ f3]>").s("triangle").adsr(0.01,0.1,0,0.1).room(0.3).gain(0.6),
  s("myvox").n(choose(0,2,4,6)).speed(0.8).crush(choose(4,8)).pan(rand).gain(0.3), 
  s("myvox").n(choose(1,3,5,7)).struct("~ ~ ~ x").speed(1.2).room(0.8).gain(0.2),
  note("<[[c4 ~ ~ ~] [~ g4 ~ ~] [f4 ~ ~ ~] [~ c4 ~ ~]]!4 [[bb3 ~ ~ ~] [~ f4 ~ ~] [eb4 ~ ~ ~] [~ bb3 ~ ~]]!4>").s("gm_pan_flute").room(0.6).delay(0.4).gain(0.3),
  note("<[[c3m ~ ~ ~] [f3 ~ ~ ~] [bb2 ~ ~ ~] [eb3 ~ ~ ~]]!4>").s("gm_telephone").room(0.5).delay(0.5).delayfb(0.4).gain(0.25),
  note("<[c4 ~ d4 eb4] [g4 ~ ~ ~] [f4 ~ eb4 d4] [c4 ~ ~ ~]>").s("saw").lpf(sine.range(500,2000).slow(8)).lpq(15).delay(0.6).delayt(0.75).room(0.5).gain(0.4)
)
        `;

        let isRunning = false;
        document.body.addEventListener('click', async () => {
            if (isRunning) return;
            isRunning = true;

            // Forza la sparizione dell'overlay anche se Strudel dovesse avere problemi
            document.getElementById('overlay').style.display = 'none';
            requestAnimationFrame(draw);

            try {
                await initStrudel();
                await evaluate(strudelCode);
            } catch (e) {
                console.error("Strudel Error:", e);
                // Se fallisce la musica, non resettiamo isRunning per non mostrare l'overlay di nuovo
            }
        });

        // --- MOTORE GRAFICO ---
        const canvas = document.getElementById('amiga-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const stars = [];
        for(let i=0; i<200; i++) {
            stars.push({ x: Math.random()*2000-1000, y: Math.random()*2000-1000, z: Math.random()*2000 });
        }

        const scrollText = "   *** IL MARCATORE TM PRESENTS *** STABLE NATIVE VERSION *** SYNTAX BUGS REMOVED *** ENJOY THE VIBE *** CLICK TO ROCK ***   ";
        let scrollX = width;
        let time = 0;

        function draw() {
            time += 0.05;
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, width, height);

            const copperY = height/2 + Math.sin(time*0.5) * (height/3);
            const gradient = ctx.createLinearGradient(0, copperY - 60, 0, copperY + 60);
            gradient.addColorStop(0, "black");
            gradient.addColorStop(0.5, "#0044aa");
            gradient.addColorStop(1, "black");
            ctx.fillStyle = gradient;
            ctx.fillRect(0, copperY - 60, width, 120);

            ctx.fillStyle = '#fff';
            for(let i=0; i<stars.length; i++) {
                let s = stars[i];
                s.z -= 4;
                if(s.z <= 0) { s.z = 2000; s.x = Math.random()*2000-1000; s.y = Math.random()*2000-1000; }
                let px = (s.x / s.z) * 500 + width/2;
                let py = (s.y / s.z) * 500 + height/2;
                let size = (1 - s.z/2000) * 3;
                if(px > 0 && px < width && py > 0 && py < height) ctx.fillRect(px, py, size, size);
            }

            ctx.textAlign = "center";
            const logoY = 120 + Math.abs(Math.sin(time * 2.5)) * 60;
            ctx.font = "bold 40px 'Press Start 2P', monospace";
            ctx.fillStyle = '#ff5500';
            ctx.fillText("IL MARCATORE TM", width/2 + 4, logoY + 4);
            ctx.fillStyle = '#ffff00';
            ctx.fillText("IL MARCATORE TM", width/2, logoY);

            ctx.font = "24px 'Press Start 2P', monospace";
            ctx.textAlign = "left";
            scrollX -= 5;
            if (scrollX < -scrollText.length * 24) scrollX = width;
            for(let i=0; i<scrollText.length; i++) {
                let charX = scrollX + (i * 24);
                if (charX > -30 && charX < width + 30) {
                    let charY = height - 80 + Math.sin((charX * 0.015) + time*2) * 40;
                    let hue = Math.floor((i * 5 - time * 50) % 360);
                    if (hue < 0) hue += 360;
                    ctx.fillStyle = `hsl(${hue}, 100%, 50%)`;
                    ctx.fillText(scrollText[i], charX, charY);
                }
            }
            requestAnimationFrame(draw);
        }
    </script>
</body>
</html>
